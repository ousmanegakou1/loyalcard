    return { ...h, ...extra };

  async fetch(path, opts={}) {
    const res = await fetch(this.url + path, { ...opts, headers: { ...this.headers(), ...(opts.headers||{}) } });

    const d = await this.fetch("/auth/v1/signup", { method:"POST", body: JSON.stringify({ email, password, data: meta }) });
    if (d.access_token) { this._token = d.access_token; this._userId = d.user?.id; }
    return d;
  },
  async signIn(email, password) {
    const d = await this.fetch("/auth/v1/token?grant_type=password", { method:"POST", body: JSON.stringify({ email, password }) });
    if (d.access_token) { this._token = d.access_token; this._userId = d.user?.id; }
    return d;

  async signInGoogle() {
    const redirect = "https://louas.com";
    window.location.href = `${this.url}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirect)}`;
  },
  async signInApple() {
    const redirect = "https://louas.com";
    window.location.href = `${this.url}/auth/v1/authorize?provider=apple&redirect_to=${encodeURIComponent(redirect)}`;
  },
  async signOut() {
    try { await this.fetch("/auth/v1/logout", { method:"POST" }); } catch(e){}
    this._token = null; this._userId = null;
    localStorage.removeItem("lc_session");
  },
  async getSession() {
    // Check localStorage for saved session
    const saved = localStorage.getItem("lc_session");
    if (!saved) return null;
    try {
      const s = JSON.parse(saved);
      if (s.expires_at && Date.now() > s.expires_at * 1000) {
        // Try to refresh
        const d = await this.fetch("/auth/v1/token?grant_type=refresh_token", { method:"POST", body: JSON.stringify({ refresh_token: s.refresh_token }) });
        if (d.access_token) {
          this._token = d.access_token; this._userId = d.user?.id;
          localStorage.setItem("lc_session", JSON.stringify(d));
          return d;
        }
        localStorage.removeItem("lc_session"); return null;
      }
      this._token = s.access_token; this._userId = s.user?.id;
      return s;
    } catch(e) { localStorage.removeItem("lc_session"); return null; }

          }

      }
      return true;
    } catch(e) {
      console.error("resetPassword error:", e);
      throw e;
    }
  },

    return this.fetch(`/rest/v1/${table}?${query}`, { method:"PATCH", body: JSON.stringify(data) });
  },
  async delete_(table, query) {
    return this.fetch(`/rest/v1/${table}?${query}`, { method:"DELETE" });

  async upsert(table, data) {

  },
};

function BannerStrip({banners}){
  const active=(banners||[]).filter(b=>b.active);
  const[idx,setIdx]=useState(0);
  useEffect(()=>{if(active.length<=1)return;const t=setInterval(()=>setIdx(i=>(i+1)%active.length),4000);return()=>clearInterval(t);},[active.length]);
  if(!active.length)return null;
  const b=active[idx%active.length];
  return <div style={{background:b.color,color:"#fff",padding:"8px 16px",fontSize:12,fontWeight:600,textAlign:"center"}}>{b.text}</div>;

        </div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
        <Btn v="s" onClick={onClose}>Fermer</Btn>
        <Btn v="s" ico={ic.print(T.g6,16)} onClick={printReceipt}>Imprimer</Btn>
        <Btn ico={ic.dl("#fff",16)} onClick={downloadPDF} disabled={downloading}>
          {downloading?<><Spinner size={14}/> Génération...</>:"Télécharger PDF"}
        </Btn>
      </div>
    </div>
  );
}

function TDash({m,profile,appSettings}){
  const[lease,setLease]=useState(null);
  const[payments,setPayments]=useState([]);
  const[loading,setLoading]=useState(true);
  const[score,setScore]=useState(null);

  useEffect(()=>{
    async function load(){
      try{
        const ls=await sb.select("leases","tenant_id=eq."+profile.id+"&status=eq.active&select=*,units(unit_number,surface_m2,rent_amount,properties(name,address))");
        const l=ls?.[0]||null;
        setLease(l);
        if(l){
          const now=new Date();
          const dayOfMonth=now.getDate();
          const period=curPeriod();
          const startDate=l.start_date?new Date(l.start_date):null;
          const enteredThisMonth=startDate&&startDate.getFullYear()===now.getFullYear()&&startDate.getMonth()===now.getMonth()&&startDate.getDate()>1;
          const ps=await sb.select("payments","lease_id=eq."+l.id+"&order=period_month.desc&limit=24");
          const hasCurrent=(ps||[]).some(p=>p.period_month===period);
          if(!hasCurrent&&!enteredThisMonth){
            const base=l.rent_amount+(l.charges_amount||0);
            const penalty=dayOfMonth>5?Math.round(base*0.05):0;
            try{
              await sb.insert("payments",{lease_id:l.id,tenant_id:profile.id,owner_id:l.owner_id,amount:base+penalty,base_amount:base,penalty_amount:penalty,period_month:period,status:dayOfMonth>5?"overdue":"pending",due_date:period+"-05"});
              const fresh=await sb.select("payments","lease_id=eq."+l.id+"&order=period_month.desc&limit=24");
              setPayments(fresh||[]);
            }catch(e){setPayments(ps||[]);}
          }else{
            if(dayOfMonth>5){
              const pending=(ps||[]).find(p=>p.period_month===period&&p.status==="pending");
              if(pending){
                const pen=Math.round((pending.base_amount||pending.amount)*0.05);
                await sb.update("payments",{status:"overdue",penalty_amount:pen,amount:(pending.base_amount||pending.amount)+pen},"id=eq."+pending.id);
              }
            }
            setPayments(ps||[]);
          }
          // Score
          try{
            const sc=await sb.select("tenant_scores","tenant_id=eq."+profile.id);
            if(sc?.[0]) setScore(sc[0]);
          }catch(e){}
        }
      }catch(e){console.error(e);}
      setLoading(false);
    }
    load();
  },[profile.id]);

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  const unit=lease?.units;
  const prop=unit?.properties;
  const paid=payments.filter(p=>p.status==="paid");
  const pending=payments.filter(p=>["pending","overdue"].includes(p.status));
  const totalPaid=paid.reduce((s,p)=>s+p.amount,0);
  const nextPay=payments.find(p=>["pending","overdue"].includes(p.status));
  const scoreVal=score?.score||0;
  const scoreColor=scoreVal>=80?T.gn:scoreVal>=60?T.ac:scoreVal>=40?T.or:T.rd;
  const scoreLabel=scoreVal>=80?"Excellent 🌟":scoreVal>=60?"Bon 👍":scoreVal>=40?"Moyen ⚠️":"À améliorer 🔴";

  return(
    <div>
      <PH m={m}>Mon espace locataire</PH>
      {!lease?(
        <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:32,textAlign:"center",color:T.g5}}>
          <div style={{fontSize:40,marginBottom:12}}>🏠</div>
          <div style={{fontWeight:800,fontSize:16,marginBottom:6,color:T.dk}}>Aucun bail actif</div>
          <div style={{fontSize:13}}>Votre propriétaire doit vous envoyer une invitation.</div>
        </div>
      ):(
        <>
          {/* Carte principale — prochain loyer */}
          <div style={{background:"linear-gradient(135deg,"+T.ac+","+T.acH+")",borderRadius:T.r,padding:m?"16px":"20px 24px",marginBottom:m?12:16,color:"#fff",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:-20,top:-20,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,.08)"}}/>
            <div style={{position:"absolute",right:20,bottom:-30,width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,.06)"}}/>
            <div style={{fontSize:11,opacity:.7,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>
              {nextPay?.status==="overdue"?"⚠️ Loyer en retard":"Prochain loyer"}
            </div>
            <div style={{fontSize:m?28:36,fontWeight:900,letterSpacing:"-1px",marginBottom:6}}>
              {nextPay?fmt(nextPay.amount)+" F":"À jour ✓"}
            </div>
            {nextPay&&(
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <span style={{fontSize:12,opacity:.8}}>{periodLabel(nextPay.period_month)}</span>
                {nextPay.penalty_amount>0&&<span style={{fontSize:11,background:"rgba(255,255,255,.2)",padding:"2px 8px",borderRadius:99}}>+{fmt(nextPay.penalty_amount)} F pénalité</span>}
              </div>
            )}
            <div style={{marginTop:12,display:"flex",gap:16}}>
              <div><div style={{fontSize:10,opacity:.6,marginBottom:1}}>Logement</div><div style={{fontSize:12,fontWeight:700}}>{unit?.unit_number||"—"}</div></div>
              <div><div style={{fontSize:10,opacity:.6,marginBottom:1}}>Propriété</div><div style={{fontSize:12,fontWeight:700}}>{prop?.name||"—"}</div></div>
              <div><div style={{fontSize:10,opacity:.6,marginBottom:1}}>Loyer de base</div><div style={{fontSize:12,fontWeight:700}}>{fmt(lease.rent_amount)} F</div></div>
            </div>
          </div>

          {/* Stats rapides */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:m?8:12,marginBottom:m?12:16}}>
            <div style={{background:T.wh,borderRadius:T.rs,padding:m?"10px":"12px 14px",border:"1px solid "+T.g2,textAlign:"center"}}>
              <div style={{fontSize:m?18:22,fontWeight:900,color:T.gn}}>{paid.length}</div>
              <div style={{fontSize:m?9:10,color:T.g5,marginTop:2}}>Paiements effectués</div>

              <div style={{fontSize:m?9:10,color:T.g5,marginTop:2}}>En attente</div>
            </div>
            <div style={{background:T.wh,borderRadius:T.rs,padding:m?"10px":"12px 14px",border:"1px solid "+T.g2,textAlign:"center"}}>
              <div style={{fontSize:m?14:16,fontWeight:900,color:T.ac}}>{fmt(totalPaid)} F</div>
              <div style={{fontSize:m?9:10,color:T.g5,marginTop:2}}>Total payé</div>
            </div>
          </div>

          {/* Score locataire */}
          {score&&(
            <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"12px 14px":"16px 20px",marginBottom:m?12:16,boxShadow:T.sh}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:800,color:T.dk}}>⭐ Mon score locataire</div>
                <span style={{fontSize:12,fontWeight:700,color:scoreColor,background:scoreColor+"15",padding:"3px 10px",borderRadius:99}}>{scoreLabel}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:m?28:32,fontWeight:900,color:scoreColor,minWidth:60}}>{scoreVal}</div>
                <div style={{flex:1}}>
                  <div style={{height:10,background:T.g2,borderRadius:5,overflow:"hidden"}}>
                    <div style={{height:"100%",width:scoreVal+"%",background:"linear-gradient(90deg,"+scoreColor+","+scoreColor+"bb)",borderRadius:5,transition:"width .6s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:T.g4}}>
                    <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
                  </div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:10}}>
                {[["✅ À l'heure",score.on_time_payments||0,T.gn],["⏰ En retard",score.late_payments||0,T.rd],["💸 Pénalités",score.penalties||0,T.or]].map(([l,v,c])=>(
                  <div key={l} style={{background:T.g50,borderRadius:T.rs,padding:"8px",textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
                    <div style={{fontSize:9,color:T.g5}}>{l}</div>

              </div>
            </div>
          )}

          {/* Contrat de bail */}
          <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"12px 14px":"16px 20px",boxShadow:T.sh,marginBottom:m?12:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>

function TPay({m,profile,appSettings}){
  const[payments,setPayments]=useState([]);
  const[lease,setLease]=useState(null);
  const[loading,setLoading]=useState(true);
  const[payModal,setPayModal]=useState(false);
  const[payStep,setPayStep]=useState(0);
  const[receipt,setReceipt]=useState(null);

  const loadData=useCallback(async()=>{
    try{
      const ls=await sb.select("leases","tenant_id=eq."+profile.id+"&status=eq.active&select=*,units(unit_number,properties(name))");
      const l=ls?.[0]||null; setLease(l);
      if(l){
        const ps=await sb.select("payments","lease_id=eq."+l.id+"&order=created_at.desc");
        const period=curPeriod();
        const hasCurrent=(ps||[]).some(p=>p.period_month===period);
        // Crée automatiquement le paiement du mois si pas encore existant
        if(!hasCurrent){
          try{
            await sb.insert("payments",{
              lease_id:l.id,
              tenant_id:profile.id,
              owner_id:l.owner_id,
              amount:l.rent_amount+(l.charges_amount||0),
              period_month:period,
              status:"pending"
            });
            const fresh=await sb.select("payments","lease_id=eq."+l.id+"&order=created_at.desc");
            setPayments(fresh||[]);
          }catch(e){
            setPayments(ps||[]);
          }
        } else {
          setPayments(ps||[]);
        }
      }
    }catch(e){console.error(e);}
    setLoading(false);
  },[profile.id]);

  useEffect(()=>{loadData();},[loadData]);

  // Recharge automatiquement après retour PayTech (polling 5s × 6 fois)
  useEffect(()=>{
    const onRefresh=()=>{setLoading(true);loadData();};
    window.addEventListener("louas:refresh",onRefresh);
    let count=0;
    const interval=setInterval(()=>{if(count++<6)loadData();else clearInterval(interval);},5000);
    return()=>{window.removeEventListener("louas:refresh",onRefresh);clearInterval(interval);};
  },[loadData]);

  const handlePay=async()=>{
    if(!lease)return;
    setPayStep(1);
    try{
      const period=curPeriod();
      const currentPay=payments.find(p=>p.period_month===period&&p.status!=="paid");
      const amount=currentPay?.amount||(lease.rent_amount+(lease.charges_amount||0));
      if(amount<100){alert("Montant minimum 100 F CFA.");setPayStep(0);return;}
      const res=await fetch("https://ksvifaawouviiftujqet.supabase.co/functions/v1/paytech-request",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer "+sb.key,   // clé anon publique — pas de JWT user
          "x-user-id": profile.id             // on passe l'user id séparément
        },
        body:JSON.stringify({lease_id:lease.id,tenant_id:profile.id,owner_id:lease.owner_id,amount,period_month:period})
      });
      const text=await res.text();
      let data;
      try{data=JSON.parse(text);}catch(e){throw new Error("Réponse invalide: "+text.slice(0,100));}
      if(!data.ok) throw new Error(data.error||data.message||"Erreur PayTech ("+res.status+")");
      setPayStep(0);setPayModal(false);
      const win=window.open(data.payment_url,"_blank","width=500,height=700,menubar=no,toolbar=no");
      if(!win) window.location.href=data.payment_url;
    }catch(e){console.error(e);alert("Erreur: "+e.message);setPayStep(0);}
  };

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  const today=new Date().getDate();
  const daysLeft=today<=5?5-today:0;
  const curPay=payments.find(p=>p.period_month===curPeriod());

  return(
    <div>
      <PH m={m} action={<Btn onClick={()=>{setPayModal(true);setPayStep(0);}} sm={m} ico={ic.wallet("#fff",16)}>Payer</Btn>}>Paiements</PH>

      {/* Alerte échéance avant le 5 */}
      {daysLeft>0&&curPay?.status==="pending"&&(
        <div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:T.r,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⏰</span>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#C2410C"}}>Échéance dans {daysLeft} jour{daysLeft>1?"s":""}</div>
            <div style={{fontSize:11,color:"#9A3412"}}>Payez avant le 5 pour éviter une pénalité de 5%</div>
          </div>
        </div>
      )}

      {/* Alerte pénalité après le 5 */}
      {curPay?.status==="overdue"&&curPay?.penalty_amount>0&&(
        <div style={{background:T.rdB,border:"1px solid "+T.rd+"44",borderRadius:T.r,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:T.rd}}>Pénalité de retard appliquée</div>
            <div style={{fontSize:11,color:T.rd}}>+{fmt(curPay.penalty_amount)} F CFA (5%) · Total dû : {fmt(curPay.amount)} F</div>
          </div>
        </div>
      )}

      {payments.length===0?<Empty icon="💳" text="Aucun paiement enregistré"/>:(
        <div style={{display:"flex",flexDirection:"column",gap:m?8:10}}>
          {payments.map(p=>(
            <div key={p.id} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+(p.status==="overdue"?T.rd+"55":T.g2),padding:m?"12px 14px":"14px 20px",boxShadow:T.sh}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:m?13:14,fontWeight:700,color:T.dk}}>{periodLabel(p.period_month)}</span><SB s={p.status}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{fontSize:m?15:16,fontWeight:800,color:p.status==="overdue"?T.rd:T.dk}}>{fmt(p.amount)} F</span>
                  {p.penalty_amount>0&&(
                    <div style={{fontSize:11,color:T.rd,marginTop:2}}>
                      Loyer : {fmt(p.base_amount||(p.amount-p.penalty_amount))} F + Pénalité 5% : {fmt(p.penalty_amount)} F
                    </div>
                  )}
                  {!p.penalty_amount&&p.status!=="paid"&&<div style={{fontSize:10,color:T.g4,marginTop:1}}>Échéance : 5 {periodLabel(p.period_month)}</div>}
                </div>
                {p.status==="paid"&&<div style={{display:"flex",gap:6}}>
                  <Btn v="g" sm ico={ic.dl(T.ac,14)} onClick={()=>setReceipt(p)}>{m?"":"Quittance"}</Btn>
                </div>}
              </div>
              {p.paid_at&&<div style={{fontSize:11,color:T.g4,marginTop:3}}>Payé le {fmtDate(p.paid_at)}</div>}
            </div>
          ))}
        </div>
      )}

      <Modal open={!!receipt} onClose={()=>setReceipt(null)} title="Quittance de loyer">
        {receipt&&<Receipt pay={receipt} profile={profile} lease={{...lease,unit_number:lease?.units?.unit_number,property_name:lease?.units?.properties?.name}} onClose={()=>setReceipt(null)} appSettings={appSettings}/>}
      </Modal>

      <Modal open={payModal} onClose={()=>setPayModal(false)} title="Payer mon loyer">
        <div>
          {lease&&(
            <div style={{background:T.g50,borderRadius:T.rs,padding:14,marginBottom:16}}>
              {[["Loyer "+periodLabel(curPeriod()),fmt(lease.rent_amount)+" F"],["Charges",fmt(lease.charges_amount||0)+" F"]].map(([l,v],i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}>
                  <span style={{color:T.g5}}>{l}</span><span style={{fontWeight:700,color:T.dk}}>{v}</span>
                </div>
              ))}
              <div style={{borderTop:"1px solid "+T.g2,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontWeight:800,color:T.dk}}>Total</span>
                <span style={{fontWeight:800,color:T.ac,fontSize:18}}>{fmt(lease.rent_amount+(lease.charges_amount||0))} F CFA</span>
              </div>
            </div>
          )}

          {/* Méthodes de paiement disponibles */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:T.g4,textTransform:"uppercase",marginBottom:8}}>Méthodes acceptées</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[["🟡","Wave"],["🟠","Orange Money"],["💳","Carte bancaire"],["💚","Free Money"]].map(([emoji,name])=>(
                <div key={name} style={{display:"flex",alignItems:"center",gap:5,background:T.g50,borderRadius:T.rs,padding:"6px 10px",fontSize:12,fontWeight:600,color:T.g6}}>
                  <span style={{fontSize:16}}>{emoji}</span>{name}
                </div>
              ))}
            </div>
          </div>

          <div style={{background:"#EEF2FF",borderRadius:T.rs,padding:"10px 14px",marginBottom:16,fontSize:12,color:T.ac,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
            🔒 Paiement sécurisé via PayTech — vous serez redirigé pour choisir votre méthode
          </div>

          <button
            onClick={handlePay}
            disabled={payStep===1}
            style={{width:"100%",padding:"15px",border:"none",borderRadius:T.r,background:payStep===1?T.g2:"linear-gradient(135deg,#4F46E5,#4338CA)",color:payStep===1?T.g4:"#fff",fontSize:15,fontWeight:700,cursor:payStep===1?"not-allowed":"pointer",fontFamily:T.f,display:"flex",alignItems:"center",justifyContent:"center",gap:8,minHeight:52,touchAction:"manipulation"}}
          >
            {payStep===1?<><Spinner size={16}/> Connexion PayTech...</>:<>Payer {fmt(lease?.rent_amount+(lease?.charges_amount||0))} F CFA →</>}
          </button>
          <div style={{textAlign:"center",marginTop:8,fontSize:10,color:T.g4}}>Propulsé par <strong>PayTech.sn</strong></div>
        </div>
      </Modal>
    </div>
  );
}

  const sendComment=async()=>{

      await sb.insert("ticket_comments",{ticket_id:showDet.id,author_id:profile.id,body:comment});

        <Fld label="Titre" required><Inp placeholder="Ex: Fuite robinet cuisine" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></Fld>
        <Fld label="Description"><TA placeholder="Décrivez le problème..." value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/></Fld>
        <Fld label="Urgence">
          <div style={{display:"flex",gap:8}}>

  useEffect(()=>{
    async function reload(){
      try{
        const ps=await sb.select("profiles","id=eq."+profile.id);
        if(ps?.[0]){
          const p=ps[0];
          setForm({full_name:p.full_name||"",phone:p.phone||"",company_name:p.company_name||""});

  const handleLogoUpload=async(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    if(file.size>5*1024*1024){alert("Image trop lourde (max 5MB)");return;}
    setUploading(true);
    try{
      // Compresse via canvas
      const compressed=await new Promise((res,rej)=>{
        const img=new Image();
        const url=URL.createObjectURL(file);
        img.onload=()=>{
          const MAX=400;
          let w=img.width,h=img.height;
          if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
          const canvas=document.createElement("canvas");
          canvas.width=w;canvas.height=h;
          canvas.getContext("2d").drawImage(img,0,0,w,h);
          URL.revokeObjectURL(url);
          canvas.toBlob(blob=>res(blob),"image/png",0.85);
        };
        img.onerror=rej;
        img.src=url;
      });

      // Upload vers Supabase Storage
      const fileName="logo-"+profile.id+".png";
      const storageRes=await fetch(
        "https://ksvifaawouviiftujqet.supabase.co/storage/v1/object/logos/"+fileName,
        {

          headers:{
            "Authorization":"Bearer "+sb._token,
            "apikey":sb.key,
            "Content-Type":"image/png",
            "x-upsert":"true",
          },
          body:compressed,
        }
      );
      if(!storageRes.ok){
        const err=await storageRes.text();
        throw new Error("Storage: "+err);
      }
      // URL publique
      const publicUrl="https://ksvifaawouviiftujqet.supabase.co/storage/v1/object/public/logos/"+fileName+"?t="+Date.now();
      setLogo(publicUrl);
    }catch(e){console.error(e);alert("Erreur upload: "+e.message);}
    setUploading(false);
  };

  const handleSave=async()=>{
    setSaving(true);

      const updated={...form,company_logo:logo||null};
      const res=await sb.update("profiles",updated,"id=eq."+profile.id);
      console.log("Profil sauvegardé:",res);
      if(setProfile) setProfile(prev=>({...prev,...updated}));
      setSaved(true);setTimeout(()=>setSaved(false),2000);

      alert("Erreur sauvegarde: "+e.message);
    }
    setSaving(false);
  };

      if(setProfile) setProfile(prev=>({...prev,...ptForm}));
      setPtSaved(true); setTimeout(()=>setPtSaved(false),2500);
    }catch(e){console.error(e);alert("Erreur: "+e.message);}
    setPtSaving(false);
  };

  const handlePaytechClear=async()=>{

    await sb.update("profiles",{paytech_api_key:null,paytech_secret_key:null},"id=eq."+profile.id);
    setPtForm({paytech_api_key:"",paytech_secret_key:""});
    if(setProfile) setProfile(prev=>({...prev,paytech_api_key:null,paytech_secret_key:null}));
  };

  const isOwner=role==="owner";

    <div>
      <PH m={m}>Mon profil</PH>

      {/* Logo agence — uniquement pour les owners */}

        <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?14:24,boxShadow:T.sh,marginBottom:14}}>

              {logo
                ? <img src={logo} alt="Logo" style={{width:"100%",height:"100%",objectFit:"contain",padding:4}}/>
                : <div style={{textAlign:"center"}}><div style={{fontSize:28,marginBottom:4}}>🏢</div><div style={{fontSize:10,color:T.g4,fontWeight:600}}>Ajouter logo</div></div>
              }
              {uploading&&<div style={{position:"absolute",inset:0,background:"rgba(255,255,255,.8)",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner size={20} color={T.ac}/></div>}

      <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?14:24,boxShadow:T.sh}}>

function ODash({m,profile,onNavigate}){
  const[stats,setStats]=useState({rev:0,unpaid:0,occ:0,total:0,openTix:0,pending:0,revYear:0,avgRent:0,collectRate:0,vacantUnits:0});
  const[monthly,setMonthly]=useState([]);
  const[recentPays,setRecentPays]=useState([]);
  const[overdueList,setOverdueList]=useState([]);
  const[agenda,setAgenda]=useState([]);
  const[loading,setLoading]=useState(true);
  const[exporting,setExporting]=useState(false);
  const[sendingReport,setSendingReport]=useState(false);
  const[relancing,setRelancing]=useState(null);

  useEffect(()=>{
    async function load(){
      try{
        const now=new Date();
        const periods=Array.from({length:6},(_,i)=>{
          const d=new Date(now.getFullYear(),now.getMonth()-i,1);
          return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
        }).reverse();

        // Queries séparées pour éviter qu'une erreur de join bloque tout
        const[ps,allPays,units]=await Promise.all([
          sb.select("payments","owner_id=eq."+profile.id+"&period_month=eq."+curPeriod()).catch(()=>[]),
          sb.select("payments","owner_id=eq."+profile.id+"&order=created_at.desc&limit=200").catch(()=>[]),
          sb.select("units","owner_id=eq."+profile.id).catch(()=>[]),
        ]);

        // Leases + tickets séparément (joins complexes)
        const ls=await sb.select("leases","owner_id=eq."+profile.id+"&status=eq.active").catch(()=>[]);
        const ts=await sb.select("tickets","owner_id=eq."+profile.id+"&status=neq.resolved").catch(()=>[]);
        const leases12=await sb.select("leases","owner_id=eq."+profile.id+"&order=created_at.desc&limit=50").catch(()=>[]);

        const rev=(ps||[]).filter(p=>p.status==="paid").reduce((s,p)=>s+p.amount,0);
        const unpaid=(ps||[]).filter(p=>["overdue","pending"].includes(p.status)).reduce((s,p)=>s+p.amount,0);
        const pending=(ps||[]).filter(p=>p.status==="pending").length;
        const revYear=(allPays||[]).filter(p=>p.status==="paid"&&p.period_month?.startsWith(String(now.getFullYear()))).reduce((s,p)=>s+p.amount,0);
        const totalUnits=(units||[]).length;
        const occupiedUnits=(ls||[]).length;
        const vacantUnits=totalUnits-occupiedUnits;
        const avgRent=occupiedUnits>0?Math.round((ls||[]).reduce((s,l)=>s+l.rent_amount,0)/occupiedUnits):0;
        const totalDue6=(allPays||[]).filter(p=>periods.includes(p.period_month)).reduce((s,p)=>s+(p.base_amount||p.amount),0);
        const totalPaid6=(allPays||[]).filter(p=>p.status==="paid"&&periods.includes(p.period_month)).reduce((s,p)=>s+p.amount,0);
        const collectRate=totalDue6>0?Math.round(totalPaid6/totalDue6*100):100;

        // Graphique 6 mois
        const monthData=periods.map(period=>{
          const paysOfMonth=(allPays||[]).filter(p=>p.period_month===period);
          const paid=paysOfMonth.filter(p=>p.status==="paid").reduce((s,p)=>s+p.amount,0);
          const due=paysOfMonth.filter(p=>["overdue","pending"].includes(p.status)).reduce((s,p)=>s+p.amount,0);
          const mnths=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
          const[y,mo]=period.split("-");
          return{period,label:mnths[parseInt(mo)-1],paid,due,total:paid+due};
        });

        // Impayés avec noms
        const overdues=(ps||[]).filter(p=>["overdue","pending"].includes(p.status));
        let overduesWithNames=overdues;
        if(overdues.length){
          const tids=overdues.map(p=>p.tenant_id).filter(Boolean);
          if(tids.length){
            const profs=await sb.select("profiles","id=in.("+[...new Set(tids)].join(",")+")")||[];
            overduesWithNames=overdues.map(p=>({...p,
              tenantName:profs.find(pr=>pr.id===p.tenant_id)?.full_name||"—",
              tenantEmail:profs.find(pr=>pr.id===p.tenant_id)?.email||null,
              tenantPhone:profs.find(pr=>pr.id===p.tenant_id)?.phone||null,
            }));
          }
        }

        // Agenda : baux qui expirent dans les 90 jours
        const agendaItems=[];
        const today90=new Date(); today90.setDate(today90.getDate()+90);
        (leases12||[]).forEach(l=>{
          if(l.end_date){
            const end=new Date(l.end_date);
            const daysLeft=Math.ceil((end-now)/86400000);
            if(daysLeft<=90&&daysLeft>-30){
              agendaItems.push({type:"bail",label:(l.profiles?.full_name||"Locataire")+" — "+l.units?.unit_number,date:l.end_date,daysLeft,color:daysLeft<0?T.rd:daysLeft<=30?T.or:T.ac});
            }
          }
        });
        // Prochaines échéances loyer (le 5 de chaque mois)
        const next5=new Date(now.getFullYear(),now.getMonth(),5);
        if(next5<now) next5.setMonth(next5.getMonth()+1);
        const daysTo5=Math.ceil((next5-now)/86400000);
        if(daysTo5<=10) agendaItems.push({type:"loyer",label:"Échéance loyers du mois",date:next5.toISOString().split("T")[0],daysLeft:daysTo5,color:T.or});
        agendaItems.sort((a,b)=>a.daysLeft-b.daysLeft);

        setStats({rev,unpaid,occ:occupiedUnits,total:totalUnits,openTix:(ts||[]).length,pending,revYear,avgRent,collectRate,vacantUnits});
        setMonthly(monthData);
        setRecentPays((allPays||[]).filter(p=>p.status==="paid").slice(0,5));
        setOverdueList(overduesWithNames);
        setAgenda(agendaItems.slice(0,5));
      }catch(e){
        console.error("ODash load error:",e.message,e);
      }
      setLoading(false);
    }
    load();
  },[profile.id]);

  // ── Export Excel paiements ──
  const exportExcel=async()=>{
    setExporting(true);
    try{
      const pays=await sb.select("payments","owner_id=eq."+profile.id+"&order=period_month.desc&limit=500");
      const tids=[...new Set((pays||[]).map(p=>p.tenant_id).filter(Boolean))];
      let profs=[];
      if(tids.length) profs=await sb.select("profiles","id=in.("+tids.join(",")+")")||[];
      const rows=[["Période","Locataire","Montant","Base","Pénalité","Statut","Payé le","Méthode"]];
      (pays||[]).forEach(p=>{
        const name=profs.find(pr=>pr.id===p.tenant_id)?.full_name||"—";
        rows.push([periodLabel(p.period_month),name,p.amount,p.base_amount||p.amount,p.penalty_amount||0,p.status,p.paid_at?fmtDate(p.paid_at):"—",p.payment_method||"—"]);
      });
      // Génère CSV (compatible Excel)
      const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
      const bom="\uFEFF"; // BOM pour Excel
      const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download="paiements-louas-"+curPeriod()+".csv";
      a.click(); URL.revokeObjectURL(url);
    }catch(e){alert("Erreur export: "+e.message);}
    setExporting(false);
  };

  // ── Rapport mensuel PDF (HTML→print) ──
  const sendMonthlyReport=async()=>{
    setSendingReport(true);
    try{
      const ownerName=profile.company_name||profile.full_name||"Propriétaire";
      await sendEmail("monthly_report",profile.email,{
        ownerName,period:curPeriod(),
        rev:stats.rev,unpaid:stats.unpaid,occ:stats.occ,total:stats.total,
        collectRate:stats.collectRate,revYear:stats.revYear,
        overdueCount:overdueList.length
      });
      alert("✅ Rapport envoyé à "+profile.email);
    }catch(e){alert("Erreur: "+e.message);}
    setSendingReport(false);
  };

  // ── Relance impayé ──
  const sendRelance=async(p,via)=>{
    const key=p.id+via;
    setRelancing(key);
    try{
      if(via==="whatsapp"&&p.tenantPhone){
        const msg="🏠 *Rappel loyer — Louas*\n\nBonjour "+p.tenantName+",\n\nVotre loyer de *"+periodLabel(p.period_month)+"* est en attente.\n\n💰 *Montant dû :* "+fmt(p.amount)+" F CFA\n\nMerci de régulariser dès que possible.\n— "+(profile.company_name||profile.full_name);
        window.open("https://wa.me/"+p.tenantPhone.replace(/\D/g,"")+"?text="+encodeURIComponent(msg),"_blank");
      }else if(via==="email"&&p.tenantEmail){
        await sendEmail("overdue",p.tenantEmail,{tenantName:p.tenantName,unit:"Logement",amount:p.amount,period:p.period_month});
        alert("✅ Email de relance envoyé à "+p.tenantEmail);
      }
    }catch(e){alert("Erreur: "+e.message);}
    setRelancing(null);
  };

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  const maxVal=Math.max(...monthly.map(d=>d.paid+d.due),1);
  const mnths=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
  const curMonth=mnths[new Date().getMonth()];

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:m?12:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:m?16:20,fontWeight:900,color:T.dk}}>Tableau de bord</div>
          <div style={{fontSize:11,color:T.g4}}>{curMonth} {new Date().getFullYear()}</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={exportExcel} disabled={exporting} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:T.gnB,color:T.gn,border:"1px solid "+T.gn+"33",borderRadius:T.rs,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation"}}>
            {exporting?<Spinner size={12} color={T.gn}/>:"📊"} Export Excel
          </button>
          <button onClick={sendMonthlyReport} disabled={sendingReport} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:T.acL,color:T.ac,border:"1px solid "+T.ac+"33",borderRadius:T.rs,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation"}}>

      {/* KPI — 4 grandes stats */}
      <div style={{display:"grid",gridTemplateColumns:m?"1fr 1fr":"repeat(4,1fr)",gap:m?8:14,marginBottom:m?10:16}}>

        <KPI label="Impayés" value={fmt(stats.unpaid)+" F"} color={stats.unpaid>0?T.rd:T.gn} icon={ic.wallet(stats.unpaid>0?T.rd:T.gn,m?16:20)} m={m}/>

      {/* Graphique 6 mois */}

          </div>
        </div>
        <div style={{display:"flex",gap:m?6:10,alignItems:"flex-end",height:m?90:130}}>
          {monthly.map((d,i)=>{

            const dH=maxVal>0?Math.round((d.due/maxVal)*(m?80:120)):0;
            const isCur=d.period===curPeriod();
            return(

                <div style={{display:"flex",alignItems:"flex-end",gap:2,width:"100%",justifyContent:"center"}}>

          <span style={{fontSize:11,color:T.g5}}>Total 6 mois : <strong style={{color:T.gn}}>{fmt(monthly.reduce((s,d)=>s+d.paid,0))} F</strong></span>
          <span style={{fontSize:11,color:T.g5}}>Taux collecte : <strong style={{color:T.ac}}>{stats.collectRate}%</strong></span>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:m?"1fr":"1fr 1fr",gap:m?12:14,marginBottom:m?12:14}}>
        {/* Impayés avec relances */}
        <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"12px":"18px 20px",boxShadow:T.sh}}>
          <div style={{fontSize:13,fontWeight:800,color:T.dk,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>

            <div style={{textAlign:"center",padding:"16px 0",color:T.gn}}><div style={{fontSize:24,marginBottom:4}}>✅</div><div style={{fontSize:12,fontWeight:700}}>Tout est à jour !</div></div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {overdueList.map((p,i)=>(

                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <div style={{fontSize:12,fontWeight:800,color:T.rd}}>{p.tenantName}</div>
                    <div style={{fontSize:13,fontWeight:900,color:T.rd}}>{fmt(p.amount)} F</div>
                  </div>
                  <div style={{fontSize:10,color:T.g5,marginBottom:7}}>{periodLabel(p.period_month)}{p.penalty_amount>0?" · +pénalité 5%":""}</div>
                  <div style={{display:"flex",gap:5}}>
                    {p.tenantPhone&&(
                      <button onClick={()=>sendRelance(p,"whatsapp")} disabled={relancing===p.id+"whatsapp"}

                        {relancing===p.id+"whatsapp"?<Spinner size={10} color="#fff"/>:<svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>}
                        WA
                      </button>
                    )}
                    {p.tenantEmail&&(
                      <button onClick={()=>sendRelance(p,"email")} disabled={relancing===p.id+"email"}
                        style={{flex:1,padding:"5px 6px",background:T.ac,color:"#fff",border:"none",borderRadius:6,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:T.f,display:"flex",alignItems:"center",justifyContent:"center",gap:4,touchAction:"manipulation"}}>

                      </button>

                    <button onClick={()=>onNavigate&&onNavigate("pay")}
                      style={{flex:1,padding:"5px 6px",background:T.g1,color:T.g6,border:"none",borderRadius:6,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation"}}>

                  </div>
                </div>
              ))}

          )}
        </div>

        {/* Agenda échéances */}
        <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"12px":"18px 20px",boxShadow:T.sh}}>
          <div style={{fontSize:13,fontWeight:800,color:T.dk,marginBottom:12}}>📅 Agenda — échéances</div>
          {agenda.length===0?(
            <div style={{textAlign:"center",padding:"16px 0",color:T.g4}}><div style={{fontSize:24,marginBottom:4}}>📅</div><div style={{fontSize:12}}>Aucune échéance proche</div></div>

      {/* Derniers paiements */}
      <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"12px":"18px 20px",boxShadow:T.sh}}>
        <div style={{fontSize:13,fontWeight:800,color:T.dk,marginBottom:12}}>💰 Derniers paiements reçus</div>
        {recentPays.length===0?<Empty icon="💳" text="Aucun paiement encore"/>:(
          <div style={{display:"grid",gridTemplateColumns:m?"1fr":"1fr 1fr",gap:8}}>
            {recentPays.map((p,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:T.gnB,borderRadius:T.rs}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:T.dk}}>{periodLabel(p.period_month)}</div>
                  <div style={{fontSize:10,color:T.g4}}>{p.paid_at?fmtDate(p.paid_at):""}</div>
                </div>
                <div style={{fontSize:13,fontWeight:900,color:T.gn}}>{fmt(p.amount)} F</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function OProps({m,profile}){
  const[props,setProps]=useState([]);
  const[units,setUnits]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showAdd,setShowAdd]=useState(false);
  const[showUnits,setShowUnits]=useState(null);
  const[showAddUnit,setShowAddUnit]=useState(null);
  const[form,setForm]=useState({name:"",address:"",type:"appartement",emoji:"🏢"});
  const[unitForm,setUnitForm]=useState({unit_number:"",type:"appartement",surface_m2:"",rent_amount:""});
  const[saving,setSaving]=useState(false);

  const loadData=useCallback(async()=>{
    try{
      const ps=await sb.select("properties","owner_id=eq."+profile.id+"&order=created_at.desc");
      setProps(ps||[]);
      if(ps?.length){
        const us=await sb.select("units","property_id=in.("+ps.map(p=>p.id).join(",")+")" );
        setUnits(us||[]);
      }
    }catch(e){console.error(e);}
    setLoading(false);
  },[profile.id]);

  useEffect(()=>{loadData();},[loadData]);

  const addProp=async()=>{
    if(!form.name)return;
    setSaving(true);
    try{await sb.insert("properties",{...form,owner_id:profile.id});setShowAdd(false);setForm({name:"",address:"",type:"appartement",emoji:"🏢"});await loadData();}
    catch(e){console.error(e);}
    setSaving(false);
  };

  const addUnit=async(propId)=>{
    if(!unitForm.unit_number||!unitForm.rent_amount)return;
    setSaving(true);
    try{await sb.insert("units",{property_id:propId,unit_number:unitForm.unit_number,type:unitForm.type,surface_m2:parseInt(unitForm.surface_m2)||null,rent_amount:parseInt(unitForm.rent_amount)||0,status:"vacant"});setShowAddUnit(null);setUnitForm({unit_number:"",type:"appartement",surface_m2:"",rent_amount:""});await loadData();}
    catch(e){console.error(e);}
    setSaving(false);
  };

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  const emojiOpts=["🏢","🏠","🏗️","🏡","🏘️","🏬"];

  return(
    <div>
      <PH m={m} action={<Btn sm={m} ico={ic.plus("#fff",16)} onClick={()=>setShowAdd(true)}>Ajouter bien</Btn>}>Mes biens</PH>
      {props.length===0?<Empty icon="🏠" text="Aucun bien ajouté"/>:(
        <div style={{display:"grid",gridTemplateColumns:m?"1fr":"repeat(auto-fill,minmax(260px,1fr))",gap:m?10:14}}>
          {props.map(p=>{
            const pUnits=units.filter(u=>u.property_id===p.id);
            const occupied=pUnits.filter(u=>u.status==="occupied").length;
            return(
              <div key={p.id} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,overflow:"hidden",boxShadow:T.sh}}>
                <div style={{height:m?60:80,background:`linear-gradient(135deg,${T.ac}18,${T.acS}33)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:m?32:42}}>{p.emoji}</div>
                <div style={{padding:m?"10px 12px":"14px 18px"}}>
                  <div style={{fontSize:15,fontWeight:800,color:T.dk,marginBottom:2}}>{p.name}</div>
                  <div style={{fontSize:11,color:T.g5,marginBottom:10}}>{p.address}</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <div><div style={{fontSize:10,color:T.g4,textTransform:"uppercase"}}>Unités</div><div style={{fontSize:13,fontWeight:700,color:T.dk}}>{occupied}/{pUnits.length}</div></div>
                  </div>
                  {pUnits.length>0&&<div style={{height:4,borderRadius:2,background:T.g1,marginBottom:10}}><div style={{height:"100%",borderRadius:2,background:T.gn,width:(pUnits.length?occupied/pUnits.length*100:0)+"%"}}/></div>}
                  <div style={{display:"flex",gap:6}}>
                    <Btn v="s" sm full onClick={()=>setShowUnits(p)}>Voir ({pUnits.length})</Btn>
                    <Btn sm ico={ic.plus("#fff",14)} onClick={()=>{setShowAddUnit(p);setUnitForm({unit_number:"",type:"appartement",surface_m2:"",rent_amount:""});}}>+ Unité</Btn>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Ajouter un bien">
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {emojiOpts.map(e=><button key={e} onClick={()=>setForm({...form,emoji:e})} style={{width:44,height:44,border:"2px solid "+(form.emoji===e?T.ac:T.g2),borderRadius:T.rs,background:form.emoji===e?T.acL:T.wh,fontSize:20,cursor:"pointer",touchAction:"manipulation"}}>{e}</button>)}
        </div>
        <Fld label="Nom" required><Inp value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Rés. Les Baobabs"/></Fld>
        <Fld label="Adresse"><Inp value={form.address} onChange={e=>setForm({...form,address:e.target.value})} placeholder="Rue 15, Dakar"/></Fld>
        <Fld label="Type"><Sel opts={[{v:"appartement",l:"Appartements"},{v:"villa",l:"Villa"},{v:"studio",l:"Studios"},{v:"commerce",l:"Commerce"}]} value={form.type} onChange={e=>setForm({...form,type:e.target.value})}/></Fld>
        <div style={{display:"flex",gap:8,marginTop:4}}><Btn v="s" full onClick={()=>setShowAdd(false)}>Annuler</Btn><Btn full onClick={addProp} disabled={saving}>{saving?<><Spinner size={14}/> ...</>:"Ajouter"}</Btn></div>
      </Modal>

      <Modal open={!!showUnits} onClose={()=>setShowUnits(null)} title={showUnits?showUnits.name+" — Unités":""}>
        {showUnits&&(
          <div>
            {units.filter(u=>u.property_id===showUnits.id).length===0
              ?<Empty icon="🏠" text="Aucune unité"/>
              :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                {units.filter(u=>u.property_id===showUnits.id).map((a,i)=>(
                  <div key={i} style={{background:T.g50,borderRadius:T.rs,padding:"10px 14px",border:"1px solid "+T.g2}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontWeight:700,color:T.dk,fontSize:13}}>{a.unit_number}</span><SB s={a.status}/></div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:T.g5}}>{a.type}{a.surface_m2?" · "+a.surface_m2+"m²":""}</span><span style={{fontWeight:700,color:T.gn}}>{fmt(a.rent_amount)} F</span></div>
                  </div>
                ))}
              </div>
            }
            <Btn full sx={{marginTop:12}} ico={ic.plus("#fff",16)} onClick={()=>{setShowAddUnit(showUnits);setShowUnits(null);}}>Ajouter une unité</Btn>
          </div>
        )}
      </Modal>

      <Modal open={!!showAddUnit} onClose={()=>setShowAddUnit(null)} title={showAddUnit?"Ajouter unité — "+showAddUnit.name:""}>
        {showAddUnit&&(
          <div>
            <Fld label="Numéro / Nom" required><Inp value={unitForm.unit_number} onChange={e=>setUnitForm({...unitForm,unit_number:e.target.value})} placeholder="Apt 3B"/></Fld>
            <Fld label="Type"><Sel opts={[{v:"appartement",l:"Appartement"},{v:"studio",l:"Studio"},{v:"villa",l:"Villa"},{v:"commerce",l:"Commerce"}]} value={unitForm.type} onChange={e=>setUnitForm({...unitForm,type:e.target.value})}/></Fld>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Fld label="Surface (m²)"><Inp type="number" value={unitForm.surface_m2} onChange={e=>setUnitForm({...unitForm,surface_m2:e.target.value})} placeholder="45"/></Fld>
              <Fld label="Loyer (F CFA)" required><Inp type="number" value={unitForm.rent_amount} onChange={e=>setUnitForm({...unitForm,rent_amount:e.target.value})} placeholder="350000"/></Fld>
            </div>
            <div style={{display:"flex",gap:8,marginTop:4}}><Btn v="s" full onClick={()=>setShowAddUnit(null)}>Annuler</Btn><Btn full onClick={()=>addUnit(showAddUnit.id)} disabled={saving}>{saving?<><Spinner size={14}/> ...</>:"Ajouter"}</Btn></div>
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ── Sélecteur locataire avec recherche ── */
function TenantPicker({value,found,onSelect}){
  const[all,setAll]=useState([]);
  const[q,setQ]=useState("");
  const[loading,setLoading]=useState(true);
  const[showList,setShowList]=useState(false);

  useEffect(()=>{
    sb.select("profiles","role=eq.tenant&order=full_name.asc")
      .then(d=>{setAll(d||[]);setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);

  const filtered=(all||[]).filter(t=>{
    if(!q)return true;
    const s=q.toLowerCase();
    return (t.full_name||"").toLowerCase().includes(s)||(t.email||"").toLowerCase().includes(s);
  });

  return(
    <div style={{position:"relative"}}>
      {/* Champ de recherche */}
      <div style={{display:"flex",gap:8}}>
        <Inp
          placeholder={loading?"Chargement...":"Rechercher par nom ou email..."}
          value={q}
          onChange={e=>{setQ(e.target.value);setShowList(true);if(!e.target.value){onSelect("",null);}}}
          onFocus={()=>setShowList(true)}
          style={{flex:1}}
          disabled={loading}
        />
        {found&&<button onClick={()=>{setQ("");onSelect("",null);}} style={{background:"none",border:"1px solid "+T.g2,borderRadius:T.rs,padding:"0 10px",cursor:"pointer",color:T.g5,fontSize:12,fontFamily:T.f}}>✕</button>}
      </div>

      {/* Locataire sélectionné */}
      {found&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,background:T.gnB,padding:"8px 12px",borderRadius:T.rs,border:"1px solid "+T.gn+"44"}}>
          <Av name={found.full_name||found.email||"?"} sz={28} c={T.gn}/>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:T.gn}}>✅ {found.full_name||"Sans nom"}</div>
            <div style={{fontSize:10,color:T.g5}}>{found.email||"Pas d'email"}</div>
          </div>
        </div>
      )}

      {/* Liste déroulante */}
      {showList&&!found&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:T.wh,border:"1px solid "+T.g2,borderRadius:T.rs,boxShadow:"0 8px 24px rgba(0,0,0,.12)",zIndex:999,maxHeight:220,overflowY:"auto",marginTop:4}}>
          {loading?(
            <div style={{padding:16,textAlign:"center"}}><Spinner size={16} color={T.ac}/></div>
          ):filtered.length===0?(
            <div style={{padding:"12px 14px",fontSize:12,color:T.g4,textAlign:"center"}}>
              {q?"Aucun résultat":"Aucun locataire inscrit pour l'instant"}
            </div>
          ):(
            filtered.map(t=>(
              <div key={t.id} onClick={()=>{onSelect(t.id,t);setShowList(false);setQ(t.full_name||t.email||"");}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid "+T.g1}}
                onMouseEnter={e=>e.currentTarget.style.background=T.g50}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <Av name={t.full_name||t.email||"?"} sz={30} c={T.gn}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.dk}}>{t.full_name||"Sans nom"}</div>
                  <div style={{fontSize:11,color:T.g4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.email||"Pas d'email"}</div>
                </div>
              </div>
            ))
          )}
        </div>
      )}

      {/* Overlay pour fermer la liste */}
      {showList&&!found&&<div style={{position:"fixed",inset:0,zIndex:998}} onClick={()=>setShowList(false)}/>}
    </div>
  );
}

function OTen({m,profile}){
  const[tenants,setTenants]=useState([]);
  const[units,setUnits]=useState([]);
  const[leases,setLeases]=useState([]);
  const[payments,setPayments]=useState([]);
  const[tenantProfiles,setTenantProfiles]=useState([]);
  const[loading,setLoading]=useState(true);
  const[q,setQ]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[showInvite,setShowInvite]=useState(null);
  const[showLease,setShowLease]=useState(null);
  const[showReminder,setShowReminder]=useState(null); // {lease, tenant, payment}
  const[inviteSent,setInviteSent]=useState(false);
  const[saving,setSaving]=useState(false);
  const[showEdit,setShowEdit]=useState(null);
  const[showDelete,setShowDelete]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[form,setForm]=useState({name:"",email:"",phone:"",unit_id:"",rent_amount:"",start_date:""});
  const[leaseForm,setLeaseForm]=useState({tenant_id:"",unit_id:"",start_date:"",rent_amount:"",charges_amount:"0"});
  const[showDocs,setShowDocs]=useState(null);   // invitation sélectionnée pour docs
  const[showScore,setShowScore]=useState(null); // tenant_id pour score
  const[docs,setDocs]=useState([]);
  const[scores,setScores]=useState({});
  const[uploadingDoc,setUploadingDoc]=useState(false);

  const loadData=useCallback(async()=>{
    try{
      const invs=await sb.select("invitations","owner_id=eq."+profile.id+"&order=created_at.desc");
      setTenants(invs||[]);
      const ps=await sb.select("properties","owner_id=eq."+profile.id);
      if(ps?.length){
        const us=await sb.select("units","property_id=in.("+ps.map(p=>p.id).join(",")+")"+"&select=id,unit_number,status,rent_amount,properties(name)");
        setUnits(us||[]);
      }
      const ls=await sb.select("leases","owner_id=eq."+profile.id+"&status=eq.active");
      setLeases(ls||[]);
      if(ls?.length){
        // Paiements du mois en cours
        const pays=await sb.select("payments","owner_id=eq."+profile.id+"&period_month=eq."+curPeriod());
        setPayments(pays||[]);
        // Profils des locataires pour avoir email/téléphone
        const tids=ls.map(l=>l.tenant_id).filter(Boolean);
        if(tids.length){
          const profs=await sb.select("profiles","id=in.("+tids.join(",")+")");
          try{const sc=await sb.select("tenant_scores","tenant_id=in.("+tids.join(",")+")");const scMap={};(sc||[]).forEach(s=>scMap[s.tenant_id]=s);setScores(scMap);}catch(e){}
          setTenantProfiles(profs||[]);
        }
      }
    }catch(e){console.error(e);}
    setLoading(false);
  },[profile.id]);

  useEffect(()=>{loadData();},[loadData]);

  const handleEdit=async()=>{
    if(!showEdit)return;
    setSaving(true);
    try{
      await sb.update("invitations",{
        invited_name:editForm.name,
        invited_email:editForm.email||null,
        invited_phone:editForm.phone||null,
        rent_amount:parseInt(editForm.rent_amount)||0,
      },"id=eq."+showEdit.id);
      setShowEdit(null);
      await loadData();
    }catch(e){alert("Erreur: "+e.message);}
    setSaving(false);
  };

  const handleDelete=async()=>{
    if(!showDelete)return;
    setSaving(true);
    try{
      const activeLease=leases.find(l=>l.unit_id===showDelete.unit_id);
      if(activeLease){
        await sb.update("leases",{status:"ended"},"id=eq."+activeLease.id);
        await sb.update("units",{status:"vacant"},"id=eq."+activeLease.unit_id);
      }
      await sb.delete_("invitations","id=eq."+showDelete.id);
      setShowDelete(null);
      await loadData();
    }catch(e){alert("Erreur: "+e.message);}
    setSaving(false);
  };

  const handleAdd=async()=>{
    setSaving(true);
    try{
      const inv=await sb.insert("invitations",{owner_id:profile.id,invited_name:form.name,invited_email:form.email||null,invited_phone:form.phone||null,unit_id:form.unit_id||null,rent_amount:parseInt(form.rent_amount)||0,status:"pending"});
      const token=inv?.[0]?.token;
      const unitLabel=units.find(u=>u.id===form.unit_id)?.unit_number||form.unit_id||"—";
      setShowAdd(false);
      setShowInvite({...form,id:inv?.[0]?.id,token});
      setInviteSent(false);
      if(form.email&&token){
        await sendEmail("invitation",form.email,{
          name:form.name,
          ownerName:profile.full_name||profile.email||"Votre propriétaire",
          unit:unitLabel,
          rent:parseInt(form.rent_amount)||0,
          token
        });
      }
      setForm({name:"",email:"",phone:"",unit_id:"",rent_amount:"",start_date:""});
      await loadData();
    }catch(e){console.error(e);}
    setSaving(false);
  };

  // Crée un bail pour un locataire existant
  const handleCreateLease=async()=>{
    if(!leaseForm.tenant_id||!leaseForm.unit_id||!leaseForm.start_date||!leaseForm.rent_amount)return;
    setSaving(true);
    try{
      // Crée le bail
      await sb.insert("leases",{
        unit_id:leaseForm.unit_id,
        tenant_id:leaseForm.tenant_id,
        owner_id:profile.id,
        start_date:leaseForm.start_date,
        rent_amount:parseInt(leaseForm.rent_amount)||0,
        charges_amount:parseInt(leaseForm.charges_amount)||0,
        status:"active"
      });
      // Marque l'unité comme occupée
      await sb.update("units",{status:"occupied"},"id=eq."+leaseForm.unit_id);
      // Notifie le locataire
      await pushNotif(leaseForm.tenant_id,"🏠 Bail activé","Votre bail a été créé par votre propriétaire. Vous pouvez maintenant accéder à votre espace.","system");
      setShowLease(null);
      setLeaseForm({tenant_id:"",unit_id:"",start_date:"",rent_amount:"",charges_amount:"0"});
      await loadData();
    }catch(e){console.error(e);alert("Erreur: "+e.message);}
    setSaving(false);
  };

  const inviteLink=()=>`${window.location.origin}?invite=${showInvite?.token||"demo"}`;
  const inviteText=()=>`Bonjour ${showInvite?.name},\n\nVous êtes invité(e) sur Louas pour gérer votre location.\n\nConnectez-vous ici : ${inviteLink()}\n\nVous pouvez utiliser Google, Apple ou créer un compte.\n\nCordialement`;

  const sendInvite=async(method)=>{
    try{
      if(showInvite?.id) await sb.update("invitations",{sent_via:method},"id=eq."+showInvite.id);
      setInviteSent(method);
    }catch(e){console.error(e);}
  };

  const list=tenants.filter(t=>t.invited_name?.toLowerCase().includes(q.toLowerCase()));

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  return(
    <div>
      <PH m={m} action={
        <div style={{display:"flex",gap:6}}>
          <Btn v="s" sm onClick={()=>setShowLease({})} ico={ic.ok(T.ac,14)}>Créer bail</Btn>
          <Btn sm={m} ico={ic.plus("#fff",16)} onClick={()=>setShowAdd(true)}>Inviter</Btn>
        </div>
      }>Locataires</PH>

      {/* Baux actifs */}
      {leases.length>0&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:T.g4,textTransform:"uppercase",marginBottom:8}}>Baux actifs ({leases.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {leases.map((l,i)=>{
              const unit=units.find(u=>u.id===l.unit_id);
              const pay=payments.find(p=>p.lease_id===l.id);
              const tenant=tenantProfiles.find(t=>t.id===l.tenant_id);
              const isPaid=pay?.status==="paid";
              const isOverdue=pay?.status==="overdue"||pay?.status==="pending";
              return(
                <div key={i} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+(isPaid?T.gn+"44":isOverdue?T.rd+"44":T.g2),padding:m?"10px 12px":"14px 18px",boxShadow:T.sh}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
                      <div style={{width:36,height:36,borderRadius:"50%",background:isPaid?T.gn:isOverdue?T.rd:T.g2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {isPaid?ic.ok("#fff",16):isOverdue?ic.bell("#fff",16):ic.home("#fff",16)}
                      </div>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,color:T.dk}}>{tenant?.full_name||"Locataire"}</div>
                        <div style={{fontSize:11,color:T.g5}}>{unit?.unit_number||"—"} · depuis {l.start_date?.slice(0,7)||"—"}</div>
                        {tenant?.email&&<div style={{fontSize:10,color:T.g4,marginTop:1}}>{tenant.email}</div>}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:14,fontWeight:800,color:isPaid?T.gn:isOverdue?T.rd:T.dk}}>{fmt(l.rent_amount)} F</div>
                      <div style={{fontSize:10,color:T.g4}}>/ mois</div>
                      {pay&&<div style={{marginTop:4}}><SB s={pay.status}/></div>}
                    </div>
                  </div>

                  {/* Boutons relance si impayé */}
                  {isOverdue&&(
                    <div style={{marginTop:10,padding:"10px 12px",background:T.rdB,borderRadius:T.rs,border:"1px solid "+T.rd+"33"}}>
                      <div style={{fontSize:11,fontWeight:700,color:T.rd,marginBottom:8}}>
                        🚨 Loyer {curPeriod()} non payé — {fmt(pay?.amount||l.rent_amount)} F CFA
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {/* WhatsApp */}
                        {(tenant?.phone||tenants.find(t=>t.invited_email===tenant?.email)?.invited_phone)&&(
                          <button onClick={()=>{
                            const phone=(tenant?.phone||tenants.find(t=>t.invited_email===tenant?.email)?.invited_phone||"").replace(/\s+/g,"").replace(/^\+/,"");
                            const msg=encodeURIComponent(`Bonjour ${tenant?.full_name||""},\n\nNous vous rappelons que votre loyer du mois de ${periodLabel(curPeriod())} d'un montant de ${fmt(pay?.amount||l.rent_amount)} F CFA n'a pas encore été réglé.\n\nMerci de procéder au paiement dès que possible via Louas.\n\nCordialement`);
                            window.open("https://wa.me/"+phone+"?text="+msg,"_blank");
                          }} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:"#25D366",color:"#fff",border:"none",borderRadius:T.rs,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation"}}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            WhatsApp
                          </button>
                        )}
                        {/* Email */}
                        {tenant?.email&&(
                          <button onClick={()=>setShowReminder({lease:l,tenant,payment:pay,unit})} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:T.ac,color:"#fff",border:"none",borderRadius:T.rs,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation"}}>
                            {ic.mail("#fff",14)} Email de relance
                          </button>
                        )}
                        {/* SMS / Téléphone */}
                        {tenant?.phone&&(
                          <button onClick={()=>{
                            const msg=encodeURIComponent(`Bonjour ${tenant?.full_name||""}, votre loyer ${periodLabel(curPeriod())} de ${fmt(pay?.amount||l.rent_amount)} F CFA est en attente. Merci de payer via Louas.`);
                            window.open("sms:"+tenant.phone+"?body="+msg);
                          }} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:T.g6,color:"#fff",border:"none",borderRadius:T.rs,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation"}}>
                            {ic.phone("#fff",14)} SMS
                          </button>
                        )}
                      </div>
                    </div>
                  )}

                  {isPaid&&(
                    <div style={{marginTop:8,fontSize:11,color:T.gn,fontWeight:700}}>
                      ✅ Loyer {curPeriod()} payé le {pay?.paid_at?new Date(pay.paid_at).toLocaleDateString("fr-FR"):"—"}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{fontSize:12,fontWeight:700,color:T.g4,textTransform:"uppercase",marginBottom:8}}>Invitations</div>
      <div style={{marginBottom:12}}><Inp placeholder="Rechercher..." value={q} onChange={e=>setQ(e.target.value)} style={{maxWidth:m?"100%":300}}/></div>
      {list.length===0?<Empty icon="👥" text="Aucun locataire encore"/>:(
        <div style={{display:"flex",flexDirection:"column",gap:m?8:10}}>
          {list.map((t,i)=>{
            const hasLease=leases.some(l=>l.unit_id===t.unit_id);
            const lease=leases.find(l=>l.unit_id===t.unit_id);
            const tenantProfile=tenantProfiles.find(p=>p.id===lease?.tenant_id);
            const score=tenantProfile?scores[tenantProfile.id]:null;
            const scoreLvl=!score?null:score.score>=80?"excellent":score.score>=60?"bon":score.score>=40?"moyen":"risque";
            const scoreColors={excellent:[T.gn,T.gnB],bon:["#0891B2","#E0F2FE"],moyen:[T.or,T.orB],risque:[T.rd,T.rdB]};
            const sc=scoreLvl?scoreColors[scoreLvl]:null;
            return(
            <div key={i} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"10px 12px":"14px 18px",boxShadow:T.sh}}>
