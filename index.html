                <Av name={t.invited_name} sz={m?34:38}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:13,fontWeight:700,color:T.dk}}>{t.invited_name}</span>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      {sc&&<span style={{fontSize:10,fontWeight:800,color:sc[0],background:sc[1],padding:"2px 7px",borderRadius:10}}>{score.score}/100</span>}
                      <SB s={t.status}/>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:T.g5,marginTop:2}}>{t.invited_email||t.invited_phone||"—"}</div>
                  {t.rent_amount>0&&<div style={{fontSize:13,fontWeight:700,color:T.dk,marginTop:2}}>{fmt(t.rent_amount)} F/mois</div>}
                </div>
              </div>
              <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                {t.status==="pending"&&(
                  <Btn v="s" sm onClick={()=>{setShowInvite({name:t.invited_name,email:t.invited_email,phone:t.invited_phone,id:t.id,token:t.token});setInviteSent(false);}}>Renvoyer</Btn>
                )}
                <Btn sm ico={ic.ok("#fff",14)} onClick={()=>{
                  const unit=units.find(u=>u.id===t.unit_id);
                  setLeaseForm({tenant_id:"",tenantEmail:t.invited_email||"",tenantFound:null,unit_id:t.unit_id||"",start_date:new Date().toISOString().split("T")[0],rent_amount:String(t.rent_amount||unit?.rent_amount||""),charges_amount:"0"});
                  setShowLease({inv:t});
                }}>Bail</Btn>
                <Btn v="s" sm onClick={async()=>{
                  setShowDocs(t);
                  try{const d=await sb.select("tenant_documents","invitation_id=eq."+t.id+"&order=created_at.desc");setDocs(d||[]);}catch(e){setDocs([]);}
                }}>📁 Docs</Btn>
                {tenantProfile&&<Btn v="s" sm onClick={()=>setShowScore({tenantId:tenantProfile.id,name:t.invited_name})}>⭐ Score</Btn>}
                <Btn v="s" sm onClick={()=>setShowEdit(t)}>✏️</Btn>
                <Btn v="d" sm onClick={()=>setShowDelete(t)}>🗑</Btn>
              </div>
            </div>
            );
          })}
        </div>
      )}

      {/* Modal Ajouter */}
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Ajouter un locataire">
        <div style={{background:T.acL,borderRadius:T.rs,padding:"10px 14px",marginBottom:14,fontSize:12,color:T.ac,fontWeight:600,lineHeight:1.5}}>
          ℹ️ Un message d'invitation sera envoyé pour que le locataire puisse se connecter via Google, Apple ou email.
        </div>
        <div style={{display:"grid",gridTemplateColumns:m?"1fr":"1fr 1fr",gap:10}}>
          <Fld label="Nom complet" required><Inp value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Amadou Diallo"/></Fld>
          <Fld label="Email"><Inp type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="amadou@email.com"/></Fld>
          <Fld label="Téléphone"><Inp value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="+221 77 000 00 00"/></Fld>
          <Fld label="Logement">
            <select value={form.unit_id} onChange={e=>setForm({...form,unit_id:e.target.value})} style={{...iS}}>
              <option value="">Sélectionner...</option>
              {units.filter(u=>u.status==="vacant").map(u=><option key={u.id} value={u.id}>{u.unit_number} — {u.properties?.name}</option>)}
            </select>
          </Fld>
          <Fld label="Loyer (F CFA)"><Inp type="number" value={form.rent_amount} onChange={e=>setForm({...form,rent_amount:e.target.value})} placeholder="350000"/></Fld>
          <Fld label="Date d'entrée"><Inp type="date" value={form.start_date} onChange={e=>setForm({...form,start_date:e.target.value})}/></Fld>
        </div>
        <div style={{fontSize:11,color:T.g4,marginBottom:12}}>* Email ou téléphone requis pour l'envoi de l'invitation</div>
        <div style={{display:"flex",gap:8}}><Btn v="s" full onClick={()=>setShowAdd(false)}>Annuler</Btn><Btn full onClick={handleAdd} disabled={saving} ico={ic.send("#fff",16)}>{saving?<><Spinner size={14}/> ...</>:"Ajouter et inviter"}</Btn></div>
      </Modal>

      {/* Modal Invitation */}
      <Modal open={!!showInvite&&!inviteSent} onClose={()=>setShowInvite(null)} title="Envoyer l'invitation">
        {showInvite&&(
          <div>
            <div style={{textAlign:"center",marginBottom:20}}>
              <Av name={showInvite.name} sz={52} c={T.ac}/>
              <div style={{fontSize:16,fontWeight:800,color:T.dk,marginTop:10}}>{showInvite.name}</div>
            </div>
            <div style={{background:T.g50,borderRadius:T.rs,padding:12,marginBottom:16,fontSize:12,color:T.g6,lineHeight:1.7,border:"1px solid "+T.g2,fontFamily:"monospace",whiteSpace:"pre-wrap"}}>
              {inviteText()}
            </div>
            <div style={{fontSize:11,fontWeight:700,color:T.g5,textTransform:"uppercase",marginBottom:10}}>Envoyer via</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {showInvite.email&&(
                <button onClick={()=>sendInvite("email")} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",border:"1px solid "+T.g2,borderRadius:T.rs,background:T.wh,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation",minHeight:52}}>
                  <div style={{width:36,height:36,borderRadius:10,background:"#EA4335",display:"flex",alignItems:"center",justifyContent:"center"}}>{ic.mail("#fff",18)}</div>
                  <div><div style={{fontSize:13,fontWeight:700,color:T.dk}}>Envoyer par Email</div><div style={{fontSize:11,color:T.g5}}>{showInvite.email}</div></div>
                </button>
              )}
              {showInvite.phone&&(
                <button onClick={()=>sendInvite("sms")} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",border:"1px solid "+T.g2,borderRadius:T.rs,background:T.wh,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation",minHeight:52}}>
                  <div style={{width:36,height:36,borderRadius:10,background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center"}}>{ic.phone("#fff",18)}</div>
                  <div><div style={{fontSize:13,fontWeight:700,color:T.dk}}>WhatsApp / SMS</div><div style={{fontSize:11,color:T.g5}}>{showInvite.phone}</div></div>
                </button>
              )}
              <button onClick={()=>{
                const text=inviteText();
                if(navigator.share){navigator.share({title:"Invitation Louas",text});}
                else{navigator.clipboard?.writeText(text);}
                sendInvite("link");
              }} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",border:"1px solid "+T.g2,borderRadius:T.rs,background:T.wh,cursor:"pointer",fontFamily:T.f,touchAction:"manipulation",minHeight:52}}>
                <div style={{width:36,height:36,borderRadius:10,background:T.g6,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </div>
                <div><div style={{fontSize:13,fontWeight:700,color:T.dk}}>Partager / Copier le lien</div><div style={{fontSize:11,color:T.g5}}>Toutes les apps</div></div>
              </button>
            </div>
            <Btn v="g" full sx={{marginTop:12}} onClick={()=>setShowInvite(null)}>Ignorer pour l'instant</Btn>
          </div>
        )}
      </Modal>

      {/* Confirmation */}
      <Modal open={!!inviteSent} onClose={()=>{setShowInvite(null);setInviteSent(false);}} title="">
        <div style={{textAlign:"center",padding:"10px 0 20px"}}>
          <div style={{width:60,height:60,borderRadius:"50%",background:T.gnB,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>{ic.ok(T.gn,28)}</div>
          <div style={{fontSize:18,fontWeight:800,color:T.dk,marginBottom:8}}>Invitation envoyée !</div>
          <div style={{fontSize:13,color:T.g5,marginBottom:4,lineHeight:1.6}}>Le locataire peut maintenant se connecter via<br/><strong>Google, Apple ou email</strong>.</div>
          <Btn full sx={{marginTop:16}} onClick={()=>{setShowInvite(null);setInviteSent(false);}}>Parfait !</Btn>
        </div>
      </Modal>

      {/* Modal Créer bail */}
      <Modal open={!!showLease} onClose={()=>setShowLease(null)} title="Créer le bail">
        {showLease&&(
          <div>
            <div style={{background:T.acL,borderRadius:T.rs,padding:"10px 14px",marginBottom:14,fontSize:12,color:T.ac,fontWeight:600}}>
              📋 Le locataire doit d'abord s'être connecté au moins une fois sur Louas.
            </div>

            {/* Sélection locataire — liste + recherche */}
            <Fld label="Choisir le locataire" required>
              <TenantPicker
                value={leaseForm.tenant_id}
                found={leaseForm.tenantFound}
                onSelect={(id,t)=>setLeaseForm(f=>({...f,tenant_id:id,tenantFound:t}))}
              />
            </Fld>

            <Fld label="Logement" required>
              <select value={leaseForm.unit_id} onChange={e=>setLeaseForm({...leaseForm,unit_id:e.target.value})} style={{...iS}}>
                <option value="">Sélectionner...</option>
                {units.map(u=><option key={u.id} value={u.id}>{u.unit_number} — {u.properties?.name}</option>)}
              </select>
            </Fld>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Fld label="Date d'entrée" required><Inp type="date" value={leaseForm.start_date} onChange={e=>setLeaseForm({...leaseForm,start_date:e.target.value})}/></Fld>
              <Fld label="Loyer (F CFA)" required><Inp type="number" value={leaseForm.rent_amount} onChange={e=>setLeaseForm({...leaseForm,rent_amount:e.target.value})} placeholder="350000"/></Fld>
              <Fld label="Charges (F CFA)"><Inp type="number" value={leaseForm.charges_amount} onChange={e=>setLeaseForm({...leaseForm,charges_amount:e.target.value})} placeholder="0"/></Fld>
            </div>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <Btn v="s" full onClick={()=>setShowLease(null)}>Annuler</Btn>
              <Btn full disabled={saving||!leaseForm.tenant_id||!leaseForm.unit_id||!leaseForm.start_date||!leaseForm.rent_amount} onClick={handleCreateLease}>
                {saving?<><Spinner size={14}/> Création...</>:"Créer le bail ✓"}
              </Btn>
            </div>
          </div>
        )}
      </Modal>

      {/* Modal Modifier locataire */}
      <Modal open={!!showEdit} onClose={()=>setShowEdit(null)} title="✏️ Modifier le locataire">
        {showEdit&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:m?"1fr":"1fr 1fr",gap:10,marginBottom:14}}>
              <Fld label="Nom complet">
                <Inp value={editForm.name??showEdit.invited_name} onChange={e=>setEditForm({...editForm,name:e.target.value})} placeholder="Amadou Diallo"/>
              </Fld>
              <Fld label="Email">
                <Inp type="email" value={editForm.email??showEdit.invited_email??""} onChange={e=>setEditForm({...editForm,email:e.target.value})} placeholder="email@exemple.com"/>
              </Fld>
              <Fld label="Téléphone">
                <Inp value={editForm.phone??showEdit.invited_phone??""} onChange={e=>setEditForm({...editForm,phone:e.target.value})} placeholder="+221 77 000 00 00"/>
              </Fld>
              <Fld label="Loyer (F CFA)">
                <Inp type="number" value={editForm.rent_amount??showEdit.rent_amount??""} onChange={e=>setEditForm({...editForm,rent_amount:e.target.value})} placeholder="350000"/>
              </Fld>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn v="s" full onClick={()=>setShowEdit(null)}>Annuler</Btn>
              <Btn full disabled={saving} onClick={handleEdit}>{saving?<><Spinner size={14}/> Sauvegarde...</>:"Sauvegarder ✓"}</Btn>
            </div>
          </div>
        )}
      </Modal>

      {/* Modal Supprimer locataire */}
      <Modal open={!!showDelete} onClose={()=>setShowDelete(null)} title="🗑 Supprimer le locataire">
        {showDelete&&(
          <div>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{width:56,height:56,borderRadius:"50%",background:T.rdB,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><span style={{fontSize:24}}>🗑</span></div>
              <div style={{fontSize:15,fontWeight:800,color:T.dk,marginBottom:8}}>Supprimer {showDelete.invited_name} ?</div>
              <div style={{fontSize:13,color:T.g5,lineHeight:1.6}}>
                Cette action est irréversible.
                {leases.find(l=>l.unit_id===showDelete.unit_id)&&(
                  <div style={{marginTop:8,background:T.rdB,padding:"8px 12px",borderRadius:T.rs,color:T.rd,fontWeight:600,fontSize:12}}>
                    ⚠️ Ce locataire a un bail actif qui sera aussi terminé.
                  </div>
                )}
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn v="s" full onClick={()=>setShowDelete(null)}>Annuler</Btn>
              <Btn full v="d" disabled={saving} onClick={handleDelete}>{saving?<><Spinner size={14}/> Suppression...</>:"Confirmer la suppression"}</Btn>
            </div>
          </div>
        )}
      </Modal>

      {/* Modal Email de relance */}
      <Modal open={!!showReminder} onClose={()=>setShowReminder(null)} title="📧 Email de relance">
        {showReminder&&(
          <div>
            <div style={{background:T.rdB,borderRadius:T.rs,padding:"10px 14px",marginBottom:14,fontSize:12,color:T.rd,fontWeight:700}}>
              🚨 {fmt(showReminder.payment?.amount||showReminder.lease?.rent_amount)} F CFA · {periodLabel(curPeriod())} · Non payé
            </div>
            <div style={{fontSize:12,color:T.g5,marginBottom:4}}>Destinataire</div>
            <div style={{fontSize:13,fontWeight:700,color:T.dk,marginBottom:14}}>{showReminder.tenant?.full_name} · {showReminder.tenant?.email}</div>
            <div style={{background:T.g50,borderRadius:T.rs,padding:"12px 14px",fontSize:12,color:T.g6,lineHeight:1.8,marginBottom:16,border:"1px solid "+T.g2}}>
              Bonjour <strong>{showReminder.tenant?.full_name}</strong>,<br/><br/>
              Nous vous rappelons que votre loyer de <strong>{periodLabel(curPeriod())}</strong> d'un montant de <strong>{fmt(showReminder.payment?.amount||showReminder.lease?.rent_amount)} F CFA</strong> pour le logement <strong>{showReminder.unit?.unit_number}</strong> n'a pas encore été réglé.<br/><br/>
              Merci de procéder au paiement via Louas.<br/><br/>
              Cordialement,<br/><strong>{profile.company_name||profile.full_name||"Votre propriétaire"}</strong>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn v="s" full onClick={()=>setShowReminder(null)}>Annuler</Btn>
              <Btn full ico={ic.send("#fff",14)} onClick={async()=>{
                try{
                  await sendEmail("reminder",showReminder.tenant.email,{
                    name:showReminder.tenant.full_name,
                    ownerName:profile.company_name||profile.full_name||"Votre propriétaire",
                    unit:showReminder.unit?.unit_number||"—",
                    amount:showReminder.payment?.amount||showReminder.lease?.rent_amount,
                    period:periodLabel(curPeriod()),
                  });
                  await pushNotif(showReminder.tenant.id,"📧 Rappel loyer","Votre propriétaire vous a envoyé un rappel pour le loyer de "+periodLabel(curPeriod())+".","system");
                  alert("✅ Email envoyé !");
                  setShowReminder(null);
                }catch(e){alert("Erreur: "+e.message);}
              }}>Envoyer</Btn>
            </div>
          </div>
        )}
      </Modal>

      {/* ══ Modal Documents locataire ══ */}
      <Modal open={!!showDocs} onClose={()=>{setShowDocs(null);setDocs([]);}} title="📁 Documents">
        {showDocs&&<TenantDocs m={m} inv={showDocs} ownerId={profile.id} docs={docs} setDocs={setDocs} uploading={uploadingDoc} setUploading={setUploadingDoc}/>}
      </Modal>

      {/* ══ Modal Score locataire ══ */}
      <Modal open={!!showScore} onClose={()=>setShowScore(null)} title="⭐ Score locataire">
        {showScore&&<TenantScoreView tenantId={showScore.tenantId} tenantName={showScore.name} score={scores[showScore.tenantId]} ownerId={profile.id}/>}
      </Modal>
    </div>
  );
}

/* ══════════════════════════════════════
   MESSAGERIE PROPRIÉTAIRE ↔ LOCATAIRES
══════════════════════════════════════ */
function OMsg({m,profile,refreshNotifs}){
  const[convs,setConvs]=useState([]);
  const[activeConv,setActiveConv]=useState(null);// {tenant_id, name, email}
  const[messages,setMessages]=useState([]);
  const[newMsg,setNewMsg]=useState("");
  const[loading,setLoading]=useState(true);
  const[sending,setSending]=useState(false);
  const msgEndRef=useRef(null);

  const loadConvs=useCallback(async()=>{
    try{
      // Récupère toutes les invitations acceptées = locataires actifs
      const invs=await sb.select("invitations","owner_id=eq."+profile.id+"&status=eq.accepted&order=created_at.desc");
      const tids=(invs||[]).map(i=>i.tenant_id).filter(Boolean);
      let profs=[];
      if(tids.length) profs=await sb.select("profiles","id=in.("+[...new Set(tids)].join(",")+")") ||[];
      // Compte les non-lus par tenant
      const msgs=await sb.select("messages","owner_id=eq."+profile.id+"&read_by_owner=eq.false") ||[];
      const unreadMap={};
      msgs.forEach(msg=>{ unreadMap[msg.tenant_id]=(unreadMap[msg.tenant_id]||0)+1; });
      const list=(invs||[]).map(inv=>{
        const p=profs.find(pr=>pr.id===inv.tenant_id)||{};
        return{tenant_id:inv.tenant_id,name:inv.invited_name||p.full_name||"Locataire",email:p.email||inv.invited_email||"",unread:unreadMap[inv.tenant_id]||0};
      }).filter(c=>c.tenant_id);
      setConvs(list);
    }catch(e){console.error(e);}
    setLoading(false);
  },[profile.id]);

  useEffect(()=>{loadConvs();},[loadConvs]);

  const openConv=async(conv)=>{
    setActiveConv(conv);
    try{
      const msgs=await sb.select("messages","owner_id=eq."+profile.id+"&tenant_id=eq."+conv.tenant_id+"&order=created_at.asc") ||[];
      setMessages(msgs);
      await sb.update("messages",{read_by_owner:true},"owner_id=eq."+profile.id+"&tenant_id=eq."+conv.tenant_id+"&read_by_owner=eq.false");
      setConvs(cs=>cs.map(c=>c.tenant_id===conv.tenant_id?{...c,unread:0}:c));
    }catch(e){setMessages([]);}
    setTimeout(()=>msgEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };

  // Polling messages toutes les 4s quand une conversation est ouverte
  const activeConvRef=useRef(null);
  useEffect(()=>{activeConvRef.current=activeConv;},[activeConv]);

  useEffect(()=>{
    const interval=setInterval(async()=>{
      const conv=activeConvRef.current;
      if(!conv)return;
      try{
        const msgs=await sb.select("messages","owner_id=eq."+profile.id+"&tenant_id=eq."+conv.tenant_id+"&order=created_at.asc");
        setMessages(prev=>{
          if(JSON.stringify(prev.map(m=>m.id))===JSON.stringify((msgs||[]).map(m=>m.id)))return prev;
          setTimeout(()=>msgEndRef.current?.scrollIntoView({behavior:"smooth"}),50);
          return msgs||[];
        });
        // Marquer lu les nouveaux messages du locataire
        await sb.update("messages",{read_by_owner:true},"owner_id=eq."+profile.id+"&tenant_id=eq."+conv.tenant_id+"&read_by_owner=eq.false&sender=eq.tenant");
      }catch(e){}
    },4000);
    return()=>clearInterval(interval);
  },[profile.id]);

  const sendMsg=async()=>{
    if(!newMsg.trim()||!activeConv||sending)return;
    setSending(true);
    const txt=newMsg.trim();
    setNewMsg("");
    try{
      await sb.insert("messages",{
        owner_id:profile.id,
        tenant_id:activeConv.tenant_id,
        sender:"owner",
        body:txt,
        read_by_tenant:false,
        read_by_owner:true,
        created_at:new Date().toISOString()
      });
      await pushNotif(activeConv.tenant_id,"💬 Message de votre propriétaire",txt.slice(0,80),"message");
      const msgs=await sb.select("messages","owner_id=eq."+profile.id+"&tenant_id=eq."+activeConv.tenant_id+"&order=created_at.asc");
      setMessages(msgs||[]);
      setTimeout(()=>msgEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
    }catch(e){alert("Erreur: "+e.message);}
    setSending(false);
  };

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  return(
    <div>
      <PH m={m}>💬 Messagerie</PH>
      <div style={{display:"grid",gridTemplateColumns:m||activeConv?"1fr":(convs.length?"280px 1fr":"1fr"),gap:14,minHeight:400}}>

        {/* Liste conversations — masquée sur mobile si conv ouverte */}
        {(!m||!activeConv)&&(
          <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,overflow:"hidden",boxShadow:T.sh}}>
            <div style={{padding:"14px 16px",borderBottom:"1px solid "+T.g2,fontWeight:800,fontSize:13,color:T.dk}}>Locataires</div>
            {convs.length===0?(
              <div style={{padding:32,textAlign:"center",color:T.g4}}>
                <div style={{fontSize:32,marginBottom:8}}>💬</div>
                <div style={{fontSize:13}}>Aucun locataire connecté</div>
                <div style={{fontSize:11,marginTop:4,color:T.g3}}>Les locataires apparaissent ici une fois leur invitation acceptée</div>
              </div>
            ):(
              convs.map(c=>(
                <button key={c.tenant_id} onClick={()=>openConv(c)}
                  style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 16px",border:"none",borderBottom:"1px solid "+T.g1,background:activeConv?.tenant_id===c.tenant_id?T.acL:"transparent",cursor:"pointer",fontFamily:T.f,touchAction:"manipulation",textAlign:"left"}}>
                  <Av name={c.name} sz={38} c={T.ac}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:T.dk}}>{c.name}</div>
                    <div style={{fontSize:11,color:T.g4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.email||"—"}</div>
                  </div>
                  {c.unread>0&&<Bg color={T.rd} bg={T.rdB}>{c.unread}</Bg>}
                </button>
              ))
            )}
          </div>
        )}

        {/* Zone messages */}
        {activeConv?(
          <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,display:"flex",flexDirection:"column",boxShadow:T.sh,minHeight:m?500:0}}>
            {/* Header conv */}
            <div style={{padding:"12px 16px",borderBottom:"1px solid "+T.g2,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              {m&&<button onClick={()=>setActiveConv(null)} style={{background:"none",border:"none",cursor:"pointer",padding:6,touchAction:"manipulation",color:T.ac,fontWeight:700,fontSize:13}}>← Retour</button>}
              <Av name={activeConv.name} sz={32} c={T.ac}/>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:T.dk}}>{activeConv.name}</div>
                <div style={{fontSize:11,color:T.gn}}>En ligne</div>
              </div>
            </div>
            {/* Messages */}
            <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"16px",display:"flex",flexDirection:"column",gap:10,minHeight:300,maxHeight:m?400:450}}>
              {messages.length===0&&(
                <div style={{textAlign:"center",color:T.g4,padding:20,fontSize:13}}>Démarrez la conversation 👋</div>
              )}
              {messages.map((msg,i)=>{
                const isOwner=msg.sender==="owner";
                return(
                  <div key={i} style={{display:"flex",justifyContent:isOwner?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:isOwner?"16px 16px 4px 16px":"16px 16px 16px 4px",background:isOwner?T.ac:T.g1,color:isOwner?"#fff":T.dk,fontSize:13,lineHeight:1.5}}>
                      <div>{msg.body}</div>
                      <div style={{fontSize:9,opacity:.6,marginTop:4,textAlign:"right"}}>{fmtDate(msg.created_at)}</div>
                    </div>
                  </div>
                );
              })}
              <div ref={msgEndRef}/>
            </div>
            {/* Input */}
            <div style={{padding:"10px 12px",borderTop:"1px solid "+T.g2,display:"flex",gap:8,flexShrink:0}}>
              <input value={newMsg} onChange={e=>setNewMsg(e.target.value)} placeholder="Écrire un message..." onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendMsg()}
                style={{flex:1,padding:"10px 14px",border:"1.5px solid "+T.g2,borderRadius:20,fontSize:14,fontFamily:T.f,outline:"none",minHeight:44,WebkitAppearance:"none"}}/>
              <button onClick={sendMsg} disabled={sending||!newMsg.trim()}
                style={{width:44,height:44,borderRadius:"50%",background:newMsg.trim()?T.ac:T.g2,color:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,touchAction:"manipulation"}}>
                {sending?<Spinner size={16} color="#fff"/>:ic.send("#fff",18)}
              </button>
            </div>
          </div>
        ):(
          !m&&<div style={{background:T.g1,borderRadius:T.r,display:"flex",alignItems:"center",justifyContent:"center",color:T.g4,fontSize:13}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:36,marginBottom:8}}>💬</div>Sélectionnez un locataire</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   GESTION DES BAUX
══════════════════════════════════════ */
function OLeases({m,profile}){
  const[leases,setLeases]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showRenew,setShowRenew]=useState(null);
  const[showEnd,setShowEnd]=useState(null);
  const[saving,setSaving]=useState(false);
  const[renewForm,setRenewForm]=useState({end_date:"",rent_amount:""});

  const loadData=useCallback(async()=>{
    try{
      const ls=await sb.select("leases","owner_id=eq."+profile.id+"&order=created_at.desc&select=*,units(unit_number,properties(name)),profiles!tenant_id(full_name,email,phone)");
      setLeases(ls||[]);
    }catch(e){}
    setLoading(false);
  },[profile.id]);

  useEffect(()=>{loadData();},[loadData]);

  const handleRenew=async()=>{
    if(!showRenew)return;
    setSaving(true);
    try{
      const updates={status:"active"};
      if(renewForm.end_date) updates.end_date=renewForm.end_date;
      if(renewForm.rent_amount) updates.rent_amount=parseInt(renewForm.rent_amount);
      await sb.update("leases",updates,"id=eq."+showRenew.id);
      if(showRenew.tenant_id) await pushNotif(showRenew.tenant_id,"📋 Bail renouvelé","Votre bail a été renouvelé par votre propriétaire.","system");
      await loadData();
      setShowRenew(null);
    }catch(e){alert("Erreur: "+e.message);}
    setSaving(false);
  };

  const handleEnd=async()=>{
    if(!showEnd)return;
    setSaving(true);
    try{
      await sb.update("leases",{status:"terminated",end_date:new Date().toISOString().split("T")[0]},"id=eq."+showEnd.id);
      await sb.update("invitations",{status:"terminated"},"owner_id=eq."+profile.id+"&invited_email=eq."+(showEnd.profiles?.email||"none"));
      if(showEnd.tenant_id) await pushNotif(showEnd.tenant_id,"📋 Bail résilié","Votre propriétaire a résilié votre bail. Contactez-le pour plus d'informations.","system");
      await loadData();
      setShowEnd(null);
    }catch(e){alert("Erreur: "+e.message);}
    setSaving(false);
  };

  const statusColors={active:[T.gn,T.gnB,"Actif"],terminated:[T.rd,T.rdB,"Résilié"],expired:[T.or,T.orB,"Expiré"]};
  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  return(
    <div>
      <PH m={m}>📋 Gestion des baux</PH>
      {leases.length===0?<Empty icon="📋" text="Aucun bail"/>:(
        <div style={{display:"flex",flexDirection:"column",gap:m?10:12}}>
          {leases.map((l,i)=>{
            const sc=statusColors[l.status]||statusColors.active;
            const tenant=l.profiles;
            const unit=l.units;
            const daysLeft=l.end_date?Math.ceil((new Date(l.end_date)-new Date())/(86400000)):null;
            const expiringSoon=daysLeft!==null&&daysLeft>0&&daysLeft<=30;
            return(
              <div key={i} style={{background:T.wh,borderRadius:T.r,border:"1.5px solid "+(expiringSoon?T.or:l.status==="terminated"?T.rd+"44":T.g2),padding:m?"12px 14px":"16px 20px",boxShadow:T.sh}}>
                {expiringSoon&&<div style={{background:T.orB,borderRadius:T.rs,padding:"6px 10px",marginBottom:10,fontSize:11,color:T.or,fontWeight:700}}>⚠️ Expire dans {daysLeft} jours</div>}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Av name={tenant?.full_name||"?"} sz={38} c={T.ac}/>
                    <div>
                      <div style={{fontSize:14,fontWeight:800,color:T.dk}}>{tenant?.full_name||"Locataire"}</div>
                      <div style={{fontSize:11,color:T.g4}}>{tenant?.email||tenant?.phone||"—"}</div>
                    </div>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:sc[0],background:sc[1],padding:"3px 10px",borderRadius:10,flexShrink:0}}>{sc[2]}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12,background:T.g1,borderRadius:T.rs,padding:10}}>
                  {[
                    ["Logement",unit?.unit_number||"—"],
                    ["Propriété",unit?.properties?.name||"—"],
                    ["Loyer",fmt(l.rent_amount)+" F/mois"],
                    ["Début",l.start_date?new Date(l.start_date).toLocaleDateString("fr-FR"):"—"],
                    ["Fin",l.end_date?new Date(l.end_date).toLocaleDateString("fr-FR"):"Indéterminée"],
                    ["Charges",fmt(l.charges_amount||0)+" F"],
                  ].map(([lb,v])=>(
                    <div key={lb}>
                      <div style={{fontSize:9,fontWeight:700,color:T.g4,textTransform:"uppercase"}}>{lb}</div>
                      <div style={{fontSize:12,fontWeight:700,color:T.dk}}>{v}</div>
                    </div>
                  ))}
                </div>
                {l.status!=="terminated"&&(
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <Btn sm onClick={()=>{setRenewForm({end_date:l.end_date||"",rent_amount:String(l.rent_amount||"")});setShowRenew(l);}}>🔄 Renouveler</Btn>
                    <Btn v="d" sm onClick={()=>setShowEnd(l)}>🚫 Résilier</Btn>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Modal Renouvellement */}
      <Modal open={!!showRenew} onClose={()=>setShowRenew(null)} title="🔄 Renouveler le bail">
        {showRenew&&(
          <div>
            <div style={{background:T.acL,borderRadius:T.rs,padding:"10px 14px",marginBottom:16,fontSize:12,color:T.ac,fontWeight:600}}>
              Bail de <strong>{showRenew.profiles?.full_name||"Locataire"}</strong>
            </div>
            <Fld label="Nouvelle date de fin (optionnel)">
              <input type="date" value={renewForm.end_date} onChange={e=>setRenewForm({...renewForm,end_date:e.target.value})} style={iS}/>
            </Fld>
            <Fld label="Nouveau loyer (optionnel)">
              <input type="number" value={renewForm.rent_amount} onChange={e=>setRenewForm({...renewForm,rent_amount:e.target.value})} placeholder={String(showRenew.rent_amount)} style={iS}/>
            </Fld>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <Btn v="s" full onClick={()=>setShowRenew(null)}>Annuler</Btn>
              <Btn full ok onClick={handleRenew} disabled={saving}>{saving?<><Spinner size={14}/> ...</>:"✅ Confirmer le renouvellement"}</Btn>
            </div>
          </div>
        )}
      </Modal>

      {/* Modal Résiliation */}
      <Modal open={!!showEnd} onClose={()=>setShowEnd(null)} title="🚫 Résilier le bail">
        {showEnd&&(
          <div>
            <div style={{background:T.rdB,borderRadius:T.rs,padding:14,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:800,color:T.rd,marginBottom:4}}>⚠️ Action irréversible</div>
              <div style={{fontSize:13,color:T.rd}}>Vous allez résilier le bail de <strong>{showEnd.profiles?.full_name||"ce locataire"}</strong>. Il sera notifié immédiatement.</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn v="s" full onClick={()=>setShowEnd(null)}>Annuler</Btn>
              <Btn v="d" full onClick={handleEnd} disabled={saving}>{saving?<><Spinner size={14}/> ...</>:"🚫 Confirmer la résiliation"}</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ══ TenantDocs ══ */
function TenantDocs({m,inv,ownerId,docs,setDocs,uploading,setUploading}){
  const DOC_TYPES=[
    {id:"cni_recto",label:"CNI Recto",icon:"🪪"},
    {id:"cni_verso",label:"CNI Verso",icon:"🪪"},
    {id:"contrat",label:"Contrat bail",icon:"📄"},
    {id:"fiche_paie",label:"Fiche de paie",icon:"💼"},
    {id:"attestation",label:"Attestation",icon:"📋"},
    {id:"autre",label:"Autre",icon:"📎"},
  ];

  const uploadDoc=async(type,label,file)=>{
    if(!file)return;
    setUploading(true);
    try{
      // Upload Supabase Storage
      const ext=file.name.split(".").pop();
      const path=`${ownerId}/${inv.id}/${type}-${Date.now()}.${ext}`;
      const uploadRes=await fetch(
        `https://ksvifaawouviiftujqet.supabase.co/storage/v1/object/tenant-docs/${path}`,
        {method:"POST",headers:{"Authorization":"Bearer "+sb._token,"Content-Type":file.type,"x-upsert":"true"},body:file}
      );
      if(!uploadRes.ok) throw new Error("Erreur upload");
      const fileUrl=`https://ksvifaawouviiftujqet.supabase.co/storage/v1/object/public/tenant-docs/${path}`;
      await sb.insert("tenant_documents",{
        owner_id:ownerId,invitation_id:inv.id,
        tenant_id:inv.tenant_id||null,
        type,label:label||type,
        file_url:fileUrl,file_name:file.name,file_size:file.size
      });
      const fresh=await sb.select("tenant_documents","invitation_id=eq."+inv.id+"&order=created_at.desc");
      setDocs(fresh||[]);
    }catch(e){alert("Erreur upload: "+e.message);}
    setUploading(false);
  };

  const deleteDoc=async(doc)=>{
    if(!window.confirm("Supprimer ce document ?"))return;
    try{
      await sb.delete_("tenant_documents","id=eq."+doc.id);
      setDocs(docs.filter(d=>d.id!==doc.id));
    }catch(e){alert("Erreur: "+e.message);}
  };

  return(
    <div>
      <div style={{background:T.acL,borderRadius:T.rs,padding:"10px 14px",fontSize:12,color:T.ac,fontWeight:600,marginBottom:16}}>
        📁 Documents de <strong>{inv.invited_name}</strong> — stockage privé et sécurisé
      </div>

      {/* Docs existants */}
      {docs.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:T.g4,textTransform:"uppercase",marginBottom:8}}>Fichiers enregistrés</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {docs.map(d=>(
              <div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.g1,borderRadius:T.rs}}>
                <span style={{fontSize:20}}>{DOC_TYPES.find(t=>t.id===d.type)?.icon||"📎"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:T.dk,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.label||d.type}</div>
                  <div style={{fontSize:10,color:T.g4}}>{d.file_name}{d.file_size?" · "+(d.file_size/1024).toFixed(0)+" Ko":""} · {fmtDate(d.created_at)}</div>
                </div>
                <a href={d.file_url} target="_blank" rel="noreferrer" style={{padding:"5px 10px",background:T.ac,color:"#fff",borderRadius:6,fontSize:11,fontWeight:700,textDecoration:"none",flexShrink:0}}>📥</a>
                <button onClick={()=>deleteDoc(d)} style={{padding:"5px 8px",background:T.rdB,color:T.rd,border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>🗑</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Upload par type */}
      <div style={{fontSize:11,fontWeight:700,color:T.g4,textTransform:"uppercase",marginBottom:10}}>Ajouter un document</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {DOC_TYPES.map(dt=>(
          <label key={dt.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:T.wh,border:"1.5px dashed "+T.g2,borderRadius:T.rs,cursor:uploading?"not-allowed":"pointer",opacity:uploading?.5:1}}>
            <span style={{fontSize:18}}>{dt.icon}</span>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:T.dk}}>{dt.label}</div>
              <div style={{fontSize:10,color:T.g4}}>Cliquer pour upload</div>
            </div>
            <input type="file" accept="image/*,.pdf" style={{display:"none"}} disabled={uploading}
              onChange={e=>{const f=e.target.files?.[0];if(f)uploadDoc(dt.id,dt.label,f);e.target.value="";}}/>
          </label>
        ))}
      </div>
      {uploading&&<div style={{textAlign:"center",padding:16,color:T.ac,fontWeight:700,fontSize:13}}><Spinner size={20} color={T.ac}/> Upload en cours...</div>}
    </div>
  );
}

/* ══ TenantScoreView ══ */
function TenantScoreView({tenantId,tenantName,score,ownerId}){
  const[localScore,setLocalScore]=useState(score||null);
  const[searching,setSearching]=useState(false);
  const[searchEmail,setSearchEmail]=useState("");
  const[searchResult,setSearchResult]=useState(null);

  const scoreLevel=s=>{
    if(!s||s.score===undefined)return null;
    if(s.score>=80)return{label:"Excellent",emoji:"🟢",color:T.gn,bg:T.gnB,desc:"Payeur très fiable, aucun incident"};
    if(s.score>=60)return{label:"Bon",emoji:"🔵",color:"#0891B2",bg:"#E0F2FE",desc:"Quelques retards mineurs"};
    if(s.score>=40)return{label:"Moyen",emoji:"🟡",color:T.or,bg:T.orB,desc:"Retards fréquents, à surveiller"};
    return{label:"Risqué",emoji:"🔴",color:T.rd,bg:T.rdB,desc:"Incidents multiples de paiement"};
  };

  const ScoreBar=({value})=>{
    const pct=Math.min(100,Math.max(0,value||0));
    const col=pct>=80?T.gn:pct>=60?"#0891B2":pct>=40?T.or:T.rd;
    return(
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:13,fontWeight:700,color:T.g5}}>Score fiabilité</span>
          <span style={{fontSize:22,fontWeight:900,color:col}}>{pct}<span style={{fontSize:13}}>/100</span></span>
        </div>
        <div style={{height:10,background:T.g2,borderRadius:5,overflow:"hidden"}}>
          <div style={{height:"100%",width:pct+"%",background:col,borderRadius:5,transition:"width .6s ease"}}/>
        </div>
      </div>
    );
  };

  const searchTenant=async()=>{
    if(!searchEmail.trim())return;
    setSearching(true);setSearchResult(null);
    try{
      const p=await sb.select("profiles","email=eq."+searchEmail.trim()+"&role=eq.tenant");
      if(!p?.length){setSearchResult({notFound:true});setSearching(false);return;}
      const sc=await sb.select("tenant_scores","tenant_id=eq."+p[0].id);
      setSearchResult({profile:p[0],score:sc?.[0]||null});
    }catch(e){setSearchResult({error:e.message});}
    setSearching(false);
  };

  const lvl=scoreLevel(localScore);

  return(
    <div>
      {/* Score du locataire actuel */}
      {tenantId&&(
        <div style={{background:lvl?.bg||T.g1,borderRadius:T.r,padding:16,marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:800,color:T.g5,marginBottom:4}}>{tenantName}</div>
          {localScore?(
            <>
              <ScoreBar value={localScore.score}/>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontSize:24}}>{lvl?.emoji}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:900,color:lvl?.color}}>{lvl?.label}</div>
                  <div style={{fontSize:12,color:T.g5}}>{lvl?.desc}</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[
                  ["Total paiements",localScore.total_payments||0,"💳"],
                  ["À l'heure",localScore.on_time_payments||0,"✅"],
                  ["En retard",localScore.late_payments||0,"⏰"],
                  ["Pénalités",localScore.penalties||0,"⚠️"],
                ].map(([l,v,e])=>(
                  <div key={l} style={{background:"rgba(255,255,255,.7)",borderRadius:T.rs,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontSize:18}}>{e}</div>
                    <div style={{fontSize:18,fontWeight:900,color:T.dk}}>{v}</div>
                    <div style={{fontSize:10,color:T.g5}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:10,color:T.g4,marginTop:10,textAlign:"right"}}>Dernière mise à jour : {fmtDate(localScore.last_calculated)}</div>
            </>
          ):(
            <div style={{textAlign:"center",padding:16}}>
              <div style={{fontSize:32,marginBottom:8}}>📊</div>
              <div style={{fontSize:13,color:T.g5}}>Aucun historique de paiement encore</div>
              <div style={{fontSize:11,color:T.g4,marginTop:4}}>Le score se calcule automatiquement après chaque paiement</div>
            </div>
          )}
        </div>
      )}

      {/* Recherche d'un locataire par email (background check) */}
      <div style={{borderTop:"1px solid "+T.g2,paddingTop:16}}>
        <div style={{fontSize:12,fontWeight:800,color:T.dk,marginBottom:4}}>🔍 Vérifier un locataire</div>
        <div style={{fontSize:11,color:T.g5,marginBottom:12}}>Cherchez n'importe quel locataire Louas par email pour voir son historique de paiement</div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={searchEmail} onChange={e=>setSearchEmail(e.target.value)} placeholder="email@locataire.com"
            style={{flex:1,padding:"10px 12px",border:"1.5px solid "+T.g2,borderRadius:T.rs,fontSize:13,fontFamily:T.f,outline:"none"}}
            onKeyDown={e=>e.key==="Enter"&&searchTenant()}/>
          <Btn onClick={searchTenant} disabled={searching} sm>{searching?<Spinner size={14}/>:"Vérifier"}</Btn>
        </div>
        {searchResult&&(
          searchResult.notFound?(
            <div style={{background:T.orB,borderRadius:T.rs,padding:"10px 14px",fontSize:12,color:T.or,fontWeight:600}}>
              ⚠️ Locataire introuvable ou pas encore sur Louas
            </div>
          ):searchResult.error?(
            <div style={{background:T.rdB,borderRadius:T.rs,padding:"10px 14px",fontSize:12,color:T.rd}}>{searchResult.error}</div>
          ):(
            <div style={{background:T.g1,borderRadius:T.r,padding:14}}>
              <div style={{fontWeight:800,fontSize:13,color:T.dk,marginBottom:10}}>{searchResult.profile.full_name||searchResult.profile.email}</div>
              {searchResult.score?(()=>{
                const sl=scoreLevel(searchResult.score);
                return(
                  <>
                    <ScoreBar value={searchResult.score.score}/>
                    <div style={{display:"flex",alignItems:"center",gap:8,background:sl.bg,padding:"8px 12px",borderRadius:T.rs}}>
                      <span style={{fontSize:20}}>{sl.emoji}</span>
                      <div>
                        <div style={{fontWeight:800,color:sl.color}}>{sl.label}</div>
                        <div style={{fontSize:11,color:T.g5}}>{sl.desc}</div>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginTop:10}}>
                      {[["💳",searchResult.score.total_payments||0,"Total"],["✅",searchResult.score.on_time_payments||0,"Ponctuel"],["⏰",searchResult.score.late_payments||0,"Retard"],["⚠️",searchResult.score.penalties||0,"Pénalités"]].map(([e,v,l])=>(
                        <div key={l} style={{textAlign:"center",background:"rgba(255,255,255,.8)",borderRadius:T.rs,padding:"8px 4px"}}>
                          <div>{e}</div><div style={{fontWeight:900,fontSize:15}}>{v}</div><div style={{fontSize:9,color:T.g5}}>{l}</div>
                        </div>
                      ))}
                    </div>
                  </>
                );
              })():(

function OTix({m,profile}){
  const[tickets,setTickets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showDet,setShowDet]=useState(null);
  const[comment,setComment]=useState("");
  useEffect(()=>{
    sb.select("tickets","owner_id=eq."+profile.id+"&order=created_at.desc&select=*,profiles!tenant_id(full_name)")
      .then(d=>{setTickets(d||[]);setLoading(false);})
      .catch(()=>setLoading(false));
  },[profile.id]);
  const updateStatus=async(id,status)=>{
    try{
      await sb.update("tickets",{status},"id=eq."+id);
      const t=tickets.find(x=>x.id===id);
      // 🔔 Notifier le locataire
      if(t?.tenant_id){
        const msg=status==="in_progress"?"Votre ticket est pris en charge par le propriétaire.":"Votre ticket a été résolu. Pensez à vérifier !";
        await pushNotif(t.tenant_id, status==="resolved"?"✅ Ticket résolu":"🔄 Ticket en cours", `"${t.title}" — ${msg}`, "ticket");
      }
      setTickets(tickets.map(x=>x.id===id?{...x,status}:x));setShowDet(null);
    }catch(e){console.error(e);}
  };
  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;
  return(
    <div>
      <PH m={m}>Réclamations</PH>
      {tickets.length===0?<Empty icon="🔧" text="Aucun ticket"/>:(
        <div style={{display:"flex",flexDirection:"column",gap:m?8:10}}>
          {tickets.map(t=>(
            <div key={t.id} onClick={()=>setShowDet(t)} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"10px 12px":"14px 18px",boxShadow:T.sh,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:6,marginBottom:5}}><div style={{display:"flex",gap:6}}><Bg color={T.g6} bg={T.g1}>{t.category}</Bg><Urg l={t.urgency}/></div><SB s={t.status}/></div>
              <div style={{fontSize:13,fontWeight:700,color:T.dk}}>{t.title}</div>
              <div style={{fontSize:11,color:T.g4,marginTop:3}}>{t.profiles?.full_name||"Locataire"} · {fmtDate(t.created_at)}</div>
            </div>
          ))}
        </div>
      )}
      <Modal open={!!showDet} onClose={()=>setShowDet(null)} title={showDet?.title||""}>
        {showDet&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}><Bg color={T.g6} bg={T.g1}>{showDet.category}</Bg><SB s={showDet.status}/><Urg l={showDet.urgency}/></div>
            {showDet.description&&<div style={{background:T.g50,borderRadius:T.rs,padding:12,marginBottom:14,fontSize:13,color:T.g6,lineHeight:1.6}}>{showDet.description}</div>}
            <div style={{marginBottom:12,display:"flex",gap:8,flexWrap:"wrap"}}>
              {showDet.status!=="in_progress"&&<Btn v="s" sm onClick={()=>updateStatus(showDet.id,"in_progress")}>Marquer en cours</Btn>}
              {showDet.status!=="resolved"&&<Btn ok sm onClick={()=>updateStatus(showDet.id,"resolved")}>Marquer résolu</Btn>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <Inp placeholder="Répondre au locataire..." value={comment} onChange={e=>setComment(e.target.value)} style={{flex:1}}/>
              <Btn ico={ic.send("#fff",16)} onClick={async()=>{if(!comment.trim())return;try{await sb.insert("ticket_comments",{ticket_id:showDet.id,author_id:profile.id,body:comment});setComment("");}catch(e){console.error(e);}}}>OK</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

  },[]);

  useEffect(()=>{loadData();},[loadData]);

  const handleRoleChange=async(userId,newRole)=>{
    setChanging(userId);
    try{
      await sb.update("profiles",{role:newRole},"id=eq."+userId);
      setUsers(users.map(u=>u.id===userId?{...u,role:newRole}:u));
    }catch(e){console.error(e);}
    setChanging(null);
  };

  const handleActivatePro=async(userId)=>{
    try{
      const exp=new Date(); exp.setDate(exp.getDate()+30);
      await sb.insert("subscriptions",{owner_id:userId,plan:"pro",status:"active",amount:0,payment_method:"admin",started_at:new Date().toISOString(),expires_at:exp.toISOString()});
      await sb.insert("notifications",{user_id:userId,title:"🎉 Abonnement Pro activé !",body:"Votre abonnement Pro a été activé par l'administrateur.",type:"system",read:false});
      await loadData();
    }catch(e){console.error(e);}
  };

  const handleRevokePro=async(userId)=>{
    try{
      await sb.update("subscriptions",{status:"cancelled"},"owner_id=eq."+userId+"&status=eq.active");
      await loadData();
    }catch(e){console.error(e);}
  };

  const rc={owner:{l:"Proprio.",c:T.ac},tenant:{l:"Locataire",c:T.gn},admin:{l:"Admin",c:T.or}};
  const filtered=users.filter(u=>{
    if(filterRole!=="all"&&u.role!==filterRole)return false;
    if(q&&!((u.full_name||"").toLowerCase().includes(q.toLowerCase())||(u.email||"").toLowerCase().includes(q.toLowerCase())))return false;
    return true;
  });

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  return(
    <div>
      <PH m={m}>Utilisateurs ({users.length})</PH>

      {/* Filtres */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[["all","Tous"],["owner","Proprios"],["tenant","Locataires"],["admin","Admins"]].map(([v,l])=>(
          <Btn key={v} sm v={filterRole===v?"p":"s"} onClick={()=>setFilterRole(v)}>{l}</Btn>
        ))}
      </div>
      <Inp placeholder="Rechercher par nom ou email..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:12}}/>

      {filtered.length===0?<Empty icon="👥" text="Aucun utilisateur"/>:(
        <div style={{display:"flex",flexDirection:"column",gap:m?8:10}}>
          {filtered.map((u,i)=>{
            const isPro=subs.some(s=>s.owner_id===u.id);
            return(
              <div key={i} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+(isPro?"#7c3aed":T.g2),padding:m?"10px 12px":"14px 18px",boxShadow:T.sh}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {u.company_logo
                    ? <img src={u.company_logo} alt="" style={{width:38,height:38,objectFit:"contain",borderRadius:8,border:"1px solid "+T.g2,padding:2,background:"#fff",flexShrink:0}}/>
                    : <Av name={u.full_name||u.id} sz={38} c={(rc[u.role]||{}).c||T.g4}/>
                  }
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                      <div>
                        <span style={{fontSize:13,fontWeight:700,color:T.dk}}>{u.full_name||"—"}</span>
                        {u.company_name&&<span style={{fontSize:11,color:T.g4,marginLeft:6}}>· {u.company_name}</span>}
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        <Bg color={(rc[u.role]||{}).c||T.g4}>{(rc[u.role]||{}).l||u.role}</Bg>
                        {isPro&&<Bg color="#7c3aed">⭐ Pro</Bg>}
                      </div>
                    </div>
                    <div style={{fontSize:11,color:T.g4,marginTop:2}}>{u.email} · {fmtDate(u.created_at)}</div>
                  </div>
                </div>

                {/* Actions admin */}
                <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                  {/* Changer rôle */}
                  <select value={u.role} onChange={e=>handleRoleChange(u.id,e.target.value)}
                    disabled={changing===u.id}
                    style={{...iS,padding:"4px 8px",fontSize:11,width:"auto",height:30}}>
                    <option value="tenant">Locataire</option>
                    <option value="owner">Propriétaire</option>
                    <option value="admin">Admin</option>
                  </select>
                  {/* Gestion abonnement (owners seulement) */}
                  {u.role==="owner"&&(
                    isPro
                      ? <Btn sm v="d" onClick={()=>handleRevokePro(u.id)}>Révoquer Pro</Btn>
                      : <Btn sm onClick={()=>handleActivatePro(u.id)} ico={ic.ok("#fff",12)}>Activer Pro</Btn>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── Admin PayTech Panel ─── */
function APaytech({m}){
  const[owners,setOwners]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(null);
  const[saved,setSaved]=useState(null);
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({paytech_api_key:"",paytech_secret_key:""});

  useEffect(()=>{
    async function load(){
      try{
        const us=await sb.select("profiles","role=eq.owner&order=full_name.asc");
        setOwners(us||[]);
      }catch(e){console.error(e);}
      setLoading(false);
    }
    load();
  },[]);

  const startEdit=(u)=>{
    setEditId(u.id);
    setForm({paytech_api_key:u.paytech_api_key||"",paytech_secret_key:u.paytech_secret_key||""});
  };

  const handleSave=async(userId)=>{
    setSaving(userId);
    try{
      await sb.update("profiles",{paytech_api_key:form.paytech_api_key||null,paytech_secret_key:form.paytech_secret_key||null},"id=eq."+userId);
      setOwners(owners.map(u=>u.id===userId?{...u,...form}:u));
      setEditId(null);
      setSaved(userId); setTimeout(()=>setSaved(null),2000);
    }catch(e){console.error(e);alert("Erreur: "+e.message);}
    setSaving(null);
  };

  const handleClear=async(userId)=>{
    if(!window.confirm("Supprimer les clés PayTech de ce propriétaire ?"))return;
    setSaving(userId);
    try{
      await sb.update("profiles",{paytech_api_key:null,paytech_secret_key:null},"id=eq."+userId);
      setOwners(owners.map(u=>u.id===userId?{...u,paytech_api_key:null,paytech_secret_key:null}:u));
    }catch(e){alert("Erreur: "+e.message);}
    setSaving(null);
  };

  if(loading)return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  return(
    <div>
      <PH m={m}>💳 Clés PayTech par propriétaire</PH>
      <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:T.r,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#92400e"}}>
        ⚠️ Ces clés permettent à chaque propriétaire d'encaisser directement via PayTech (Wave, Orange Money, Free Money). Elles sont stockées de façon sécurisée et transmises à la Edge Function lors des paiements.
      </div>
      {owners.length===0?<Empty icon="🏠" text="Aucun propriétaire"/>:(
        <div style={{display:"flex",flexDirection:"column",gap:m?8:10}}>
          {owners.map((u)=>{
            const hasKeys=!!(u.paytech_api_key&&u.paytech_secret_key);
            const isEditing=editId===u.id;
            return(
              <div key={u.id} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+(hasKeys?"#d1fae5":T.g2),padding:m?"10px 12px":"16px 20px",boxShadow:T.sh}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isEditing?12:0}}>
                  {u.company_logo
                    ?<img src={u.company_logo} alt="" style={{width:36,height:36,objectFit:"contain",borderRadius:8,border:"1px solid "+T.g2,padding:2,background:"#fff",flexShrink:0}}/>
                    :<Av name={u.full_name||u.email||"?"} sz={36}/>
                  }
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:T.dk}}>{u.company_name||u.full_name||"—"}</div>
                    <div style={{fontSize:11,color:T.g4}}>{u.email}</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    <Bg color={hasKeys?T.gn:T.g4}>{hasKeys?"✅ Configuré":"⚠️ Non configuré"}</Bg>
                    {!isEditing&&<Btn sm onClick={()=>startEdit(u)} ico={ic.ok("#fff",12)}>{hasKeys?"Modifier":"Configurer"}</Btn>}
                    {hasKeys&&!isEditing&&<Btn sm v="d" onClick={()=>handleClear(u.id)}>Effacer</Btn>}
                  </div>
                </div>
                {isEditing&&(
                  <div style={{background:T.g50,borderRadius:T.rs,padding:"12px 14px"}}>
                    <Fld label="API Key PayTech (clé publique)">
                      <Inp value={form.paytech_api_key} onChange={e=>setForm({...form,paytech_api_key:e.target.value})} placeholder="pk_live_xxxxxxxxxxxxxxxx"/>
                    </Fld>
                    <Fld label="Secret Key PayTech">
                      <Inp value={form.paytech_secret_key} onChange={e=>setForm({...form,paytech_secret_key:e.target.value})} placeholder="sk_live_xxxxxxxxxxxxxxxx" type="password"/>
                    </Fld>
                    <div style={{display:"flex",gap:8,marginTop:8}}>
                      <Btn sm onClick={()=>handleSave(u.id)} disabled={saving===u.id}>
                        {saving===u.id?<><Spinner size={12}/> Sauvegarde...</>:saved===u.id?<>{ic.ok("#fff",12)} Sauvegardé !</>:"Sauvegarder"}
                      </Btn>
                      <Btn sm v="s" onClick={()=>setEditId(null)}>Annuler</Btn>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ASubs({m}){

                  }
                  <div style={{flex:1,minWidth:0}}>

                    <div style={{fontSize:11,color:T.g4}}>{p?.email}</div>

                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <Bg color="#7c3aed">⭐ Pro</Bg>
                    <div style={{fontSize:11,color:T.g4,marginTop:4}}>{fmt(s.amount||0)} F</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {cancelled.length>0&&(
        <>
          <div style={{fontSize:13,fontWeight:800,color:T.g5,marginBottom:8}}>Expirés / Annulés ({cancelled.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:m?6:8}}>
            {cancelled.slice(0,5).map((s,i)=>{
              const p=s.profiles;
              return(
                <div key={i} style={{background:T.g50,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"8px 12px":"10px 16px",opacity:.7}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:T.g6}}>{p?.company_name||p?.full_name||"—"}</div>
                      <div style={{fontSize:10,color:T.g4}}>{p?.email}</div>
                    </div>
                    <Bg color={T.g4}>Annulé</Bg>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

function GlobalNotifSend(){
  const[title,setTitle]=useState("");
  const[body,setBody]=useState("");
  const[target,setTarget]=useState("all");
  const[sending,setSending]=useState(false);
  const[sent,setSent]=useState(false);

  const handleSend=async()=>{
    if(!title||!body) return;
    setSending(true);
    try{
      let filter="order=id.asc";
      if(target==="owner") filter+="&role=eq.owner";
      if(target==="tenant") filter+="&role=eq.tenant";
      const users=await sb.select("profiles",filter+"&select=id");
      for(const u of (users||[])){
        await sb.insert("notifications",{user_id:u.id,title,body,type:"system",read:false});
      }
      setSent(true); setTitle(""); setBody("");
      setTimeout(()=>setSent(false),3000);
    }catch(e){alert("Erreur: "+e.message);}
    setSending(false);
  };

  return(
    <div>
      <Fld label="Destinataires">
        <div style={{display:"flex",gap:8}}>
          {[["all","Tous"],["owner","Proprios"],["tenant","Locataires"]].map(([v,l])=>(
            <button key={v} onClick={()=>setTarget(v)} style={{padding:"7px 14px",border:"2px solid "+(target===v?T.ac:T.g2),borderRadius:T.rs,background:target===v?T.acL:T.wh,color:target===v?T.ac:T.g5,fontFamily:T.f,fontSize:12,fontWeight:700,cursor:"pointer",touchAction:"manipulation"}}>{l}</button>
          ))}
        </div>
      </Fld>
      <Fld label="Titre"><Inp value={title} onChange={e=>setTitle(e.target.value)} placeholder="Ex: Mise à jour disponible"/></Fld>
      <Fld label="Message"><TA value={body} onChange={e=>setBody(e.target.value)} placeholder="Contenu de la notification..." style={{minHeight:70}}/></Fld>
      <Btn full disabled={sending||!title||!body} onClick={handleSend}>
        {sending?<><Spinner size={14}/> Envoi...</>:sent?"✅ Notification envoyée !":"📢 Envoyer à tous"}
      </Btn>
    </div>
  );
}

// Vérifie les loyers en retard pour un proprio et génère des alertes
async function checkOverdueRents(ownerId){
  try{
    const period=curPeriod();
    const today=new Date().getDate();
    const leases=await sb.select("leases","owner_id=eq."+ownerId+"&status=eq.active&select=*,units(unit_number),profiles!tenant_id(full_name,email)");
    if(!leases?.length) return [];
    const alerts=[];
    for(const l of leases){
      const pays=await sb.select("payments","lease_id=eq."+l.id+"&period_month=eq."+period);
      const paid=pays?.find(p=>p.status==="paid");
      if(!paid){
        const tenantName=l.profiles?.full_name||"Locataire";
        const tenantEmail=l.profiles?.email||null;
        const unit=l.units?.unit_number||"";
        const baseAmount=l.rent_amount+(l.charges_amount||0);

        // Après le 5 : appliquer pénalité 5% + passer en overdue
        if(today>5){
          const pending=pays?.find(p=>p.status==="pending");
          if(pending){
            const penalty=Math.round(baseAmount*0.05);
            try{
              await sb.update("payments",{
                status:"overdue",
                penalty_amount:penalty,
                amount:baseAmount+penalty
              },"id=eq."+pending.id);
            }catch(e){}
          }

          // Envoyer email de rappel automatique une fois par mois
          // (vérifie qu'on n'a pas déjà envoyé ce mois-ci)
          if(tenantEmail){
            const todayStr=new Date().toISOString().split("T")[0];
            const monthStart=period+"-01";
            const existing=await sb.select("notifications",
              "user_id=eq."+l.tenant_id+
              "&type=eq.penalty"+
              "&body=like.*"+period+"*"
            );
            if(!existing?.length){
              const penalty=Math.round(baseAmount*0.05);
              const total=baseAmount+penalty;
              // Notif locataire
              await sb.insert("notifications",{
                user_id:l.tenant_id,
                title:"⚠️ Loyer en retard — Pénalité appliquée",
                body:`Votre loyer de ${periodLabel(period)} (${fmt(baseAmount)} F) n'a pas été payé avant le 5. Une pénalité de 5% (${fmt(penalty)} F) a été ajoutée. Total dû : ${fmt(total)} F CFA.`,
                type:"penalty",
                read:false
              });
              // Notif proprio
              await sb.insert("notifications",{
                user_id:ownerId,
                title:"🚨 Pénalité appliquée — "+tenantName,
                body:`${tenantName} (${unit}) n'a pas payé avant le 5. Pénalité 5% appliquée. Total dû : ${fmt(total)} F CFA.`,
                type:"penalty",
                read:false
              });
              // Email locataire via Edge Function
              try{
                await sendEmail("penalty",tenantEmail,{
                  name:tenantName,
                  baseAmount,
                  penalty,
                  total,
                  period,
                  unit,
                });
              }catch(e){}
            }
          }
        }

        alerts.push({leaseId:l.id,tenantId:l.tenant_id,tenantName,unit,
          amount:today>5?Math.round(baseAmount*1.05):baseAmount,
          baseAmount,
          penalty:today>5?Math.round(baseAmount*0.05):0,
          period
        });
      }
    }
    return alerts;
  }catch(e){return [];}
}

/* ══ Centre de notifications amélioré ══ */
function TMsg({m,profile,refreshNotifs}){
  const[messages,setMessages]=useState([]);
  const[newMsg,setNewMsg]=useState("");
  const[sending,setSending]=useState(false);
  const[ownerInfo,setOwnerInfo]=useState(null);
  const msgEndRef=useRef(null);

  const loadMsgs=useCallback(async()=>{
    try{
      const ls=await sb.select("leases","tenant_id=eq."+profile.id+"&status=eq.active&limit=1");
      if(!ls?.[0]) return;
      const ownerId=ls[0].owner_id;
      const ownerProf=await sb.select("profiles","id=eq."+ownerId);
      setOwnerInfo(ownerProf?.[0]||{id:ownerId,full_name:"Propriétaire"});
      const msgs=await sb.select("messages","owner_id=eq."+ownerId+"&tenant_id=eq."+profile.id+"&order=created_at.asc");
      setMessages(msgs||[]);
      await sb.update("messages",{read_by_tenant:true},"owner_id=eq."+ownerId+"&tenant_id=eq."+profile.id+"&read_by_tenant=eq.false");
    }catch(e){}
    setTimeout(()=>msgEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  },[profile.id]);

  useEffect(()=>{loadMsgs();},[loadMsgs]);

  // Polling toutes les 4s
  const ownerInfoRef=useRef(null);
  useEffect(()=>{ownerInfoRef.current=ownerInfo;},[ownerInfo]);

  useEffect(()=>{
    const interval=setInterval(async()=>{
      const owner=ownerInfoRef.current;
      if(!owner?.id)return;
      try{
        const msgs=await sb.select("messages","owner_id=eq."+owner.id+"&tenant_id=eq."+profile.id+"&order=created_at.asc");
        setMessages(prev=>{
          if(JSON.stringify(prev.map(m=>m.id))===JSON.stringify((msgs||[]).map(m=>m.id)))return prev;
          setTimeout(()=>msgEndRef.current?.scrollIntoView({behavior:"smooth"}),50);
          return msgs||[];
        });
        await sb.update("messages",{read_by_tenant:true},"owner_id=eq."+owner.id+"&tenant_id=eq."+profile.id+"&read_by_tenant=eq.false&sender=eq.owner");
      }catch(e){}
    },4000);
    return()=>clearInterval(interval);
  },[profile.id]);

  const sendMsg=async()=>{
    if(!newMsg.trim()||!ownerInfo||sending)return;
    setSending(true);
    const txt=newMsg.trim();
    setNewMsg("");
    try{
      await sb.insert("messages",{
        owner_id:ownerInfo.id,
        tenant_id:profile.id,
        sender:"tenant",
        body:txt,
        read_by_tenant:true,
        read_by_owner:false,
        created_at:new Date().toISOString()
      });
      await pushNotif(ownerInfo.id,"💬 Message de "+(profile.full_name||profile.email||"Locataire"),txt.slice(0,80),"message");
      if(refreshNotifs) refreshNotifs(); // met à jour le badge côté locataire aussi
      await loadMsgs();
    }catch(e){alert("Erreur: "+e.message);}
    setSending(false);
  };

  return(
    <div>
      <PH m={m}>💬 Messages</PH>
      <div style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,display:"flex",flexDirection:"column",boxShadow:T.sh,minHeight:400}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid "+T.g2,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <Av name={ownerInfo?.company_name||ownerInfo?.full_name||"Prop"} sz={36} c={T.ac}/>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:T.dk}}>{ownerInfo?.company_name||ownerInfo?.full_name||"Propriétaire"}</div>
            <div style={{fontSize:11,color:T.gn}}>Votre propriétaire</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:16,display:"flex",flexDirection:"column",gap:10,minHeight:300,maxHeight:450}}>
          {messages.length===0&&<div style={{textAlign:"center",color:T.g4,padding:24,fontSize:13}}>Posez une question à votre propriétaire 👋</div>}
          {messages.map((msg,i)=>{
            const isMine=msg.sender==="tenant";
            return(
              <div key={i} style={{display:"flex",justifyContent:isMine?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:isMine?"16px 16px 4px 16px":"16px 16px 16px 4px",background:isMine?T.ac:T.g1,color:isMine?"#fff":T.dk,fontSize:13,lineHeight:1.5}}>
                  <div>{msg.body}</div>
                  <div style={{fontSize:9,opacity:.6,marginTop:4,textAlign:"right"}}>{fmtDate(msg.created_at)}</div>
                </div>
              </div>
            );
          })}
          <div ref={msgEndRef}/>
        </div>
        <div style={{padding:"10px 12px",borderTop:"1px solid "+T.g2,display:"flex",gap:8,flexShrink:0}}>
          <input value={newMsg} onChange={e=>setNewMsg(e.target.value)} placeholder="Écrire un message..." onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendMsg()}
            style={{flex:1,padding:"10px 14px",border:"1.5px solid "+T.g2,borderRadius:20,fontSize:14,fontFamily:T.f,outline:"none",minHeight:44,WebkitAppearance:"none"}}/>
          <button onClick={sendMsg} disabled={sending||!newMsg.trim()||!ownerInfo}
            style={{width:44,height:44,borderRadius:"50%",background:newMsg.trim()&&ownerInfo?T.ac:T.g2,color:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,touchAction:"manipulation"}}>
            {sending?<Spinner size={16} color="#fff"/>:ic.send("#fff",18)}
          </button>
        </div>
      </div>
    </div>
  );
}

  const typeIcon={
    payment:()=><div style={{width:36,height:36,borderRadius:T.rs,background:T.gnB,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ic.wallet(T.gn,18)}</div>,
    ticket:()=><div style={{width:36,height:36,borderRadius:T.rs,background:T.orB,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ic.ticket(T.or,18)}</div>,
    invite:()=><div style={{width:36,height:36,borderRadius:T.rs,background:T.acL,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ic.mail(T.ac,18)}</div>,
    overdue:()=><div style={{width:36,height:36,borderRadius:T.rs,background:T.rdB,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ic.bell(T.rd,18)}</div>,
    system:()=><div style={{width:36,height:36,borderRadius:T.rs,background:T.g1,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ic.bell(T.g5,18)}</div>,
  };

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  return(
    <div>
      <PH m={m} action={unread>0&&<Btn v="s" sm onClick={handleMarkAllRead}>Tout marquer lu ({unread})</Btn>}>
        Notifications {unread>0&&<Bg color={T.rd} bg={T.rdB}>{unread} non lues</Bg>}
      </PH>

      {notifs.length===0?(
        <div style={{textAlign:"center",padding:"48px 20px"}}>
          <div style={{fontSize:48,marginBottom:12}}>🔔</div>
          <div style={{fontSize:15,fontWeight:700,color:T.dk,marginBottom:6}}>Aucune notification</div>
          <div style={{fontSize:13,color:T.g5}}>Vous serez alerté des paiements, tickets et événements importants.</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:m?6:8}}>
          {notifs.map((n)=>(
            <div
              key={n.id}
              onClick={()=>!n.read&&handleMarkOne(n.id)}
              style={{
                background:n.read?T.wh:T.acL,
                borderRadius:T.r,
                border:"1px solid "+(n.read?T.g2:T.acS),
                padding:m?"10px 12px":"14px 18px",
                boxShadow:T.sh,
                display:"flex",
                gap:12,
                alignItems:"flex-start",
                cursor:n.read?"default":"pointer",
                transition:"background .2s",
              }}
            >
              {(typeIcon[n.type]||typeIcon.system)()}
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",gap:6,marginBottom:3,alignItems:"flex-start"}}>
                  <span style={{fontSize:13,fontWeight:n.read?600:800,color:T.dk,lineHeight:1.3}}>{n.title}</span>
                  {!n.read&&<span style={{width:8,height:8,borderRadius:"50%",background:T.ac,flexShrink:0,marginTop:4}}/>}
                </div>
                {n.body&&<div style={{fontSize:12,color:T.g6,lineHeight:1.5,marginBottom:3}}>{n.body}</div>}
                <div style={{fontSize:10,color:T.g4}}>{fmtDate(n.created_at)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
