const EXPENSE_CATS=[
  {v:"reparation",l:"🔧 Réparation",c:"#D97706"},
  {v:"facture",l:"💡 Facture",c:"#2563EB"},
  {v:"taxe",l:"🏛️ Taxe / Impôt",c:"#DC2626"},
  {v:"assurance",l:"🛡️ Assurance",c:"#059669"},
  {v:"entretien",l:"🧹 Entretien",c:"#7C3AED"},
  {v:"frais_agence",l:"🤝 Frais agence",c:"#0891B2"},
  {v:"autre",l:"📌 Autre",c:"#6B7280"},
];

function OExp({m,profile}){
  const[expenses,setExpenses]=useState([]);
  const[props,setProps]=useState([]);
  const[units,setUnits]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showAdd,setShowAdd]=useState(false);
  const[saving,setSaving]=useState(false);
  const[filter,setFilter]=useState("all");
  const[filterProp,setFilterProp]=useState("all");
  const[form,setForm]=useState({title:"",category:"reparation",amount:"",date:new Date().toISOString().split("T")[0],property_id:"",unit_id:"",description:""});

  const loadData=useCallback(async()=>{
    try{
      const[exps,ps]=await Promise.all([
        sb.select("expenses","owner_id=eq."+profile.id+"&order=date.desc&select=*,properties(name),units(unit_number)"),
        sb.select("properties","owner_id=eq."+profile.id),
      ]);
      setExpenses(exps||[]);
      setProps(ps||[]);
      if(ps?.length){
        const us=await sb.select("units","property_id=in.("+ps.map(p=>p.id).join(",")+")"+"&select=id,unit_number,property_id");
        setUnits(us||[]);
      }
    }catch(e){console.error(e);}
    setLoading(false);
  },[profile.id]);

  useEffect(()=>{loadData();},[loadData]);

  const handleAdd=async()=>{
    if(!form.title||!form.amount||!form.date)return;
    setSaving(true);
    try{
      await sb.insert("expenses",{
        owner_id:profile.id,
        property_id:form.property_id||null,
        unit_id:form.unit_id||null,
        category:form.category,
        title:form.title,
        description:form.description||null,
        amount:parseInt(form.amount)||0,
        date:form.date,
      });
      setShowAdd(false);
      setForm({title:"",category:"reparation",amount:"",date:new Date().toISOString().split("T")[0],property_id:"",unit_id:"",description:""});
      await loadData();
    }catch(e){console.error(e);}
    setSaving(false);
  };

  const handleDelete=async(id)=>{
    if(!confirm("Supprimer cette dépense ?"))return;
    try{await sb.delete_("expenses","id=eq."+id);await loadData();}
    catch(e){console.error(e);}
  };

  // Export CSV
  const exportCSV=()=>{
    const rows=filtered;
    const headers=["Date","Titre","Catégorie","Bien","Logement","Montant (F CFA)","Description"];
    const lines=[headers.join(";"),...rows.map(e=>[
      e.date,
      `"${e.title}"`,
      EXPENSE_CATS.find(c=>c.v===e.category)?.l.replace(/[^\w\s]/g,"")||e.category,
      `"${e.properties?.name||""}"`,
      `"${e.units?.unit_number||""}"`,
      e.amount,
      `"${e.description||""}"`,
    ].join(";"))];
    const csv="\uFEFF"+lines.join("\n"); // BOM pour Excel
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`Depenses_Louas_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Export PDF (page HTML imprimable)
  const exportPDF=()=>{
    const rows=filtered;
    const total=rows.reduce((s,e)=>s+e.amount,0);
    const html=`<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"/>
<title>Dépenses — Louas</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;padding:32px;color:#0F1729;}
  h1{font-size:22px;font-weight:900;margin-bottom:4px;}
  .sub{font-size:12px;color:#6B7280;margin-bottom:24px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{background:#0F1729;color:#fff;padding:8px 10px;text-align:left;font-weight:700;}
  td{padding:8px 10px;border-bottom:1px solid #E5E7EB;}
  tr:nth-child(even) td{background:#F9FAFB;}
  .total{margin-top:16px;text-align:right;font-size:16px;font-weight:900;}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
  @media print{@page{margin:16mm;}}
</style></head>
<body>
<h1>📊 Relevé de Dépenses</h1>
<div class="sub">Généré le ${new Date().toLocaleDateString("fr-FR")} · Louas</div>
<table>
  <thead><tr><th>Date</th><th>Titre</th><th>Catégorie</th><th>Bien / Logement</th><th style="text-align:right">Montant</th></tr></thead>
  <tbody>
    ${rows.map(e=>`<tr>
      <td>${e.date}</td>
      <td><strong>${e.title}</strong>${e.description?`<br/><span style="color:#6B7280;font-size:10px">${e.description}</span>`:""}</td>
      <td>${EXPENSE_CATS.find(c=>c.v===e.category)?.l||e.category}</td>
      <td>${e.properties?.name||"—"}${e.units?.unit_number?` / ${e.units.unit_number}`:""}</td>
      <td style="text-align:right;font-weight:700">${new Intl.NumberFormat("fr-FR").format(e.amount)} F</td>
    </tr>`).join("")}
  </tbody>
</table>
<div class="total">Total : ${new Intl.NumberFormat("fr-FR").format(total)} F CFA</div>
<script>window.onload=function(){window.print();}<\/script>
</body></html>`;
    const blob=new Blob([html],{type:"text/html"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`Depenses_Louas_${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const filtered=expenses.filter(e=>{
    if(filter!=="all"&&e.category!==filter)return false;
    if(filterProp!=="all"&&e.property_id!==filterProp)return false;
    return true;
  });

  const total=filtered.reduce((s,e)=>s+e.amount,0);
  const byCategory=EXPENSE_CATS.map(c=>({...c,total:filtered.filter(e=>e.category===c.v).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0);

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner size={32} color={T.ac}/></div>;

  const unitsByProp=units.filter(u=>u.property_id===form.property_id);

  return(
    <div>
      <PH m={m} action={
        <div style={{display:"flex",gap:6}}>
          <Btn v="s" sm onClick={exportCSV} ico={ic.dl(T.g6,14)}>CSV</Btn>
          <Btn v="s" sm onClick={exportPDF} ico={ic.print(T.g6,14)}>PDF</Btn>
          <Btn sm ico={ic.plus("#fff",14)} onClick={()=>setShowAdd(true)}>Ajouter</Btn>
        </div>
      }>Dépenses</PH>

      {/* Stats rapides */}
      <div style={{display:"grid",gridTemplateColumns:m?"1fr 1fr":"repeat(4,1fr)",gap:m?8:12,marginBottom:14}}>
        <KPI label="Total (filtre)" value={fmt(total)+" F"} color={T.rd} icon={ic.wallet(T.rd,m?16:18)} m={m}/>
        <KPI label="Nb dépenses" value={filtered.length} color={T.ac} icon={ic.chart(T.ac,m?16:18)} m={m}/>
        {byCategory.slice(0,2).map(c=>(
          <KPI key={c.v} label={c.l.replace(/[^\w\s]/g,"").trim()} value={fmt(c.total)+" F"} color={c.c} icon={ic.wallet(c.c,m?16:18)} m={m}/>
        ))}
      </div>

      {/* Filtres */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        <Btn sm v={filter==="all"?"p":"s"} onClick={()=>setFilter("all")}>Toutes</Btn>
        {EXPENSE_CATS.map(c=>(
          <Btn key={c.v} sm v={filter===c.v?"p":"s"} onClick={()=>setFilter(c.v)}>{c.l}</Btn>
        ))}
      </div>
      {props.length>1&&(
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          <Btn sm v={filterProp==="all"?"p":"s"} onClick={()=>setFilterProp("all")}>Tous les biens</Btn>
          {props.map(p=>(
            <Btn key={p.id} sm v={filterProp===p.id?"p":"s"} onClick={()=>setFilterProp(p.id)}>{p.name}</Btn>
          ))}
        </div>
      )}

      {/* Liste */}
      {filtered.length===0?<Empty icon="📊" text="Aucune dépense enregistrée"/>:(
        <div style={{display:"flex",flexDirection:"column",gap:m?8:10}}>
          {filtered.map(e=>{
            const cat=EXPENSE_CATS.find(c=>c.v===e.category)||EXPENSE_CATS[EXPENSE_CATS.length-1];
            return(
              <div key={e.id} style={{background:T.wh,borderRadius:T.r,border:"1px solid "+T.g2,padding:m?"12px 14px":"14px 20px",boxShadow:T.sh}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,fontWeight:700,color:cat.c,background:cat.c+"18",padding:"2px 8px",borderRadius:20}}>{cat.l}</span>
                      {e.properties?.name&&<span style={{fontSize:11,color:T.g4}}>{e.properties.name}{e.units?.unit_number?" / "+e.units.unit_number:""}</span>}
                    </div>
                    <div style={{fontSize:m?13:14,fontWeight:700,color:T.dk}}>{e.title}</div>
                    {e.description&&<div style={{fontSize:11,color:T.g5,marginTop:2}}>{e.description}</div>}
                    <div style={{fontSize:11,color:T.g4,marginTop:3}}>{fmtDate(e.date)}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:m?15:16,fontWeight:900,color:T.rd}}>-{fmt(e.amount)} F</div>
                    <button onClick={()=>handleDelete(e.id)} style={{background:"none",border:"none",color:T.g4,cursor:"pointer",fontSize:11,marginTop:4,padding:"2px 6px",fontFamily:T.f}}>🗑</button>
                  </div>
                </div>
              </div>
            );
          })}
          <div style={{background:T.g50,borderRadius:T.r,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid "+T.g2}}>
            <span style={{fontSize:13,fontWeight:700,color:T.g5}}>TOTAL ({filtered.length} dépenses)</span>
            <span style={{fontSize:18,fontWeight:900,color:T.rd}}>-{fmt(total)} F CFA</span>
          </div>
        </div>
      )}

      {/* Modal Ajouter */}
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Nouvelle dépense">
        <Fld label="Catégorie" required>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {EXPENSE_CATS.map(c=>(
              <button key={c.v} onClick={()=>setForm({...form,category:c.v})}
                style={{padding:"7px 10px",border:"2px solid "+(form.category===c.v?c.c:T.g2),borderRadius:T.rs,background:form.category===c.v?c.c+"15":T.wh,color:form.category===c.v?c.c:T.g5,fontFamily:T.f,fontSize:11,fontWeight:700,cursor:"pointer",touchAction:"manipulation"}}>
                {c.l}
              </button>
            ))}
          </div>
        </Fld>
        <Fld label="Titre" required><Inp placeholder="Ex: Réparation robinet salle de bain" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></Fld>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Fld label="Montant (F CFA)" required><Inp type="number" placeholder="25000" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></Fld>
          <Fld label="Date" required><Inp type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></Fld>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Fld label="Bien">
            <select value={form.property_id} onChange={e=>setForm({...form,property_id:e.target.value,unit_id:""})} style={{...iS}}>
              <option value="">— Général —</option>
              {props.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </Fld>
          <Fld label="Logement">
            <select value={form.unit_id} onChange={e=>setForm({...form,unit_id:e.target.value})} style={{...iS}} disabled={!form.property_id}>
              <option value="">— Tous —</option>
              {unitsByProp.map(u=><option key={u.id} value={u.id}>{u.unit_number}</option>)}
            </select>
          </Fld>
        </div>
        <Fld label="Description / Note"><TA placeholder="Détails supplémentaires..." value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/></Fld>
        <div style={{display:"flex",gap:8}}>
          <Btn v="s" full onClick={()=>setShowAdd(false)}>Annuler</Btn>
          <Btn full disabled={saving||!form.title||!form.amount} onClick={handleAdd}>
            {saving?<><Spinner size={14}/> Enregistrement...</>:"Enregistrer"}
          </Btn>
        </div>
      </Modal>
    </div>
  );
}

function OSub({m,profile}){

  const[paying,setPaying]=useState(false);
  const[props,setProps]=useState([]);
  const[tenants,setTenants]=useState([]);

  useEffect(()=>{
    async function load(){
      try{
        const[subs,ps,ts]=await Promise.all([
          sb.select("subscriptions","owner_id=eq."+profile.id+"&status=eq.active&order=created_at.desc&limit=1"),
          sb.select("properties","owner_id=eq."+profile.id),
          sb.select("invitations","owner_id=eq."+profile.id),

        setSub(subs?.[0]||null);
        setProps(ps||[]);

  };

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontSize:20,fontWeight:900,color:T.dk}}>⭐ Plan Pro</div>

function Login({onLogin,appSettings}){
  const m=useM();
  const[role,setRole]=useState("tenant");
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[confirmPwd,setConfirmPwd]=useState("");
  const[isRegister,setIsRegister]=useState(false);
  const[showPwd,setShowPwd]=useState(false);
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const[forgotMode,setForgotMode]=useState(false);
  const[forgotSent,setForgotSent]=useState(false);
  const[forgotLoading,setForgotLoading]=useState(false);
  const logoText=appSettings?.logoText||APP_NAME;

  const handleForgot=async()=>{
    if(!email){setErr("Entrez votre email d'abord.");return;}
    setForgotLoading(true);setErr("");
    try{
      await sb.resetPassword(email);
      setForgotSent(true);
    }catch(e){
      // Affiche le message brut pour diagnostic
      setErr(e.message||JSON.stringify(e));
    }
    setForgotLoading(false);
  };

  // ── Détecte lien d'invitation ?invite=TOKEN
  const[inviteToken,setInviteToken]=useState(null);
  const[inviteData,setInviteData]=useState(null);
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const token=params.get("invite");
    if(token&&token!=="demo"){
      setInviteToken(token);
      setIsRegister(true);
      setRole("tenant");
      // Charge les infos de l'invitation
      sb.select("invitations","token=eq."+token).then(res=>{
        if(res?.[0]){
          setInviteData(res[0]);
          if(res[0].invited_email) setEmail(res[0].invited_email);
        }
      }).catch(()=>{});
      // Nettoie l'URL
      window.history.replaceState(null,"",window.location.pathname);
    }
  },[]);

  const handleEmailAuth=async()=>{
    setErr("");
    if(!email||!password){setErr("Remplissez tous les champs.");return;}
    if(isRegister&&password!==confirmPwd){setErr("Les mots de passe ne correspondent pas.");return;}
    if(isRegister&&password.length<6){setErr("Mot de passe trop court (6 caractères min).");return;}
    setLoading(true);
    try{
      let session;
      if(isRegister){
        const name=inviteData?.invited_name||email.split("@")[0];
        session=await sb.signUp(email,password,{role:"tenant",full_name:name});
      }else{
        session=await sb.signIn(email,password);
      }
      if(!session?.user?.id) throw new Error("Erreur. Vérifiez vos informations.");
      sb.saveSession(session);
      await new Promise(r=>setTimeout(r,800));
      let profile=null;
      try{const ps=await sb.select("profiles","id=eq."+session.user.id);profile=ps?.[0]||null;}catch(e){}
      if(!profile) profile={id:session.user.id,email:session.user.email,role:isRegister?"tenant":role,full_name:inviteData?.invited_name||email.split("@")[0]};

      // ── Met à jour l'invitation si token présent
      if(inviteToken&&inviteData){
        try{
          await sb.update("invitations",{status:"accepted"},"token=eq."+inviteToken);
          // Met aussi à jour le profil avec tenant_id dans invitation
          await sb.update("profiles",{
            full_name:inviteData.invited_name||profile.full_name,
            phone:inviteData.invited_phone||profile.phone||null,
          },"id=eq."+session.user.id);
        }catch(e){console.error("Invite update error",e);}
      }

      onLogin(profile.role||role, {...profile,role:profile.role||role});
    }catch(e){
      setErr(e.message==="User already registered"?"Un compte existe déjà avec cet email. Connectez-vous.":e.message||"Erreur de connexion.");
    }
    setLoading(false);
  };

  const GoogleLogo=()=>(
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
  );

  return(

              <div style={{marginBottom:6}}><span style={{fontSize:m?34:42,fontWeight:900,letterSpacing:"-2px"}}><span style={{color:"#818cf8"}}>{logoText.slice(0,4)}</span><span style={{color:"#fff"}}>{logoText.slice(4)}</span></span></div>
            )}
            <p style={{margin:0,fontSize:13,color:"rgba(255,255,255,.45)"}}>Plateforme de gestion locative</p>
          </div>

          <div style={{background:"rgba(255,255,255,.97)",borderRadius:20,padding:m?"22px 18px":"30px 26px",boxShadow:"0 24px 80px rgba(0,0,0,.45)"}}>

            {/* Mode invitation — bandeau spécial */}
            {inviteData?(
              <div style={{background:"linear-gradient(135deg,#059669,#047857)",borderRadius:T.rs,padding:"12px 16px",marginBottom:18,textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:4}}>🏠</div>
                <div style={{color:"#fff",fontWeight:800,fontSize:14}}>Invitation de {inviteData.invited_name||"votre propriétaire"}</div>
                <div style={{color:"rgba(255,255,255,.8)",fontSize:12,marginTop:2}}>Créez votre compte locataire pour accéder à votre espace</div>
              </div>
            ):(
              <>
                {/* Tabs rôle */}
                <div style={{display:"flex",background:T.g1,borderRadius:T.rs,padding:3,marginBottom:20}}>
                  {[["tenant","🏠 Locataire",T.gn],["owner","🏢 Propriétaire",T.ac]].map(([r,label,color])=>(
                    <button key={r} onClick={()=>{setRole(r);setErr("");}} style={{flex:1,padding:"9px 8px",border:"none",borderRadius:T.rs-2,cursor:"pointer",fontFamily:T.f,fontSize:m?12:13,fontWeight:700,background:role===r?T.wh:"transparent",color:role===r?color:T.g4,boxShadow:role===r?"0 1px 4px rgba(0,0,0,.12)":"none",transition:"all .2s",touchAction:"manipulation",minHeight:40}}>{label}</button>
                  ))}
                </div>
                {/* Tabs connexion / inscription */}
                <div style={{display:"flex",background:T.g1,borderRadius:T.rs,padding:3,marginBottom:16}}>
                  {[["login","Connexion"],["register","Inscription"]].map(([v,l])=>(
                    <button key={v} onClick={()=>{setIsRegister(v==="register");setErr("");}} style={{flex:1,padding:"8px",border:"none",borderRadius:T.rs-2,cursor:"pointer",fontFamily:T.f,fontSize:12,fontWeight:700,background:(!isRegister&&v==="login")||(isRegister&&v==="register")?T.wh:"transparent",color:T.dk,touchAction:"manipulation",minHeight:36}}>{l}</button>
                  ))}
                </div>

            <Fld label="Email">
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}>{ic.mail(T.g4,16)}</div>
                <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} placeholder="votre@email.com" style={{...iS,paddingLeft:38,background:inviteData?.invited_email?T.g50:T.wh}} autoComplete="username" readOnly={!!inviteData?.invited_email} onKeyDown={e=>e.key==="Enter"&&handleEmailAuth()}/>

/* ══════════════════════════════════════

══════════════════════════════════════ */
function ResetPassword({onDone}){
  const m=useM();
  const[pwd,setPwd]=useState("");
  const[pwd2,setPwd2]=useState("");
  const[saving,setSaving]=useState(false);
  const[done,setDone]=useState(false);
  const[err,setErr]=useState("");
  const[show,setShow]=useState(false);

  const handleSubmit=async()=>{
    setErr("");
    if(!pwd||pwd.length<6){setErr("Le mot de passe doit faire au moins 6 caractères.");return;}
    if(pwd!==pwd2){setErr("Les mots de passe ne correspondent pas.");return;}
    setSaving(true);
    try{
      const res=await sb.fetch("/auth/v1/user",{
        method:"PUT",
        body:JSON.stringify({password:pwd})
      });
      if(res?.error||res?.msg?.includes("error")){
        setErr("Erreur : "+( res.error_description||res.msg||"Réessayez."));
      } else {
        setDone(true);
        sb._token=null; sb._userId=null; localStorage.removeItem("lc_session");
        setTimeout(()=>onDone(),2500);
      }
    }catch(e){setErr("Erreur : "+e.message);}
    setSaving(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(150deg,#0F1729,#1e1b4b,#312e81)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:T.f}}>
      <div style={{background:T.wh,borderRadius:20,padding:m?"28px 22px":"36px 40px",maxWidth:400,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,.3)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:36,marginBottom:8}}>{done?"✅":"🔒"}</div>
          <div style={{fontSize:20,fontWeight:900,color:T.dk,marginBottom:6}}>
            {done?"Mot de passe mis à jour !":"Nouveau mot de passe"}
          </div>
          <div style={{fontSize:13,color:T.g5}}>
            {done?"Vous allez être redirigé vers la connexion…":"Choisissez un nouveau mot de passe sécurisé."}
          </div>
        </div>

        {!done&&(
          <>
            <Fld label="Nouveau mot de passe">
              <div style={{position:"relative"}}>
                <input
                  type={show?"text":"password"}
                  value={pwd}
                  onChange={e=>{setPwd(e.target.value);setErr("");}}
                  placeholder="••••••••  (6 caractères min)"
                  style={{...iS,paddingRight:44}}
                  autoComplete="new-password"
                  onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
                />
                <button onClick={()=>setShow(!show)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.g4,fontSize:18,padding:0}}>
                  {show?"🙈":"👁"}
                </button>
              </div>
            </Fld>
            <Fld label="Confirmer le mot de passe">
              <input
                type="password"
                value={pwd2}
                onChange={e=>{setPwd2(e.target.value);setErr("");}}
                placeholder="••••••••"
                style={{...iS}}
                autoComplete="new-password"
                onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
              />
            </Fld>

            {err&&<div style={{background:T.rdB,color:T.rd,borderRadius:T.rs,padding:"10px 14px",fontSize:12,fontWeight:600,marginBottom:12}}>{err}</div>}

            {/* Indicateur force mot de passe */}
            {pwd&&(
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",gap:4,marginBottom:4}}>
                  {[1,2,3,4].map(i=>{
                    const strength=pwd.length>=8&&/[A-Z]/.test(pwd)&&/[0-9]/.test(pwd)&&/[^a-zA-Z0-9]/.test(pwd)?4:pwd.length>=8&&(/[A-Z]/.test(pwd)||/[0-9]/.test(pwd))?3:pwd.length>=6?2:1;
                    return <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=strength?[T.rd,T.or,T.gn,T.gn][strength-1]:T.g2,transition:"background .2s"}}/>;
                  })}
                </div>
                <div style={{fontSize:10,color:T.g4}}>
                  {pwd.length<6?"Trop court":pwd.length>=8&&/[A-Z]/.test(pwd)&&/[0-9]/.test(pwd)?"Fort 💪":pwd.length>=6?"Moyen — ajoutez chiffres et majuscules":"Correct"}
                </div>
              </div>
            )}

            <button
              onClick={handleSubmit}
              disabled={saving||!pwd||!pwd2}
              style={{width:"100%",padding:"14px",background:saving||!pwd||!pwd2?T.g2:"linear-gradient(135deg,#4F46E5,#4338CA)",color:saving||!pwd||!pwd2?T.g4:"#fff",border:"none",borderRadius:T.r,fontSize:15,fontWeight:700,cursor:saving||!pwd||!pwd2?"not-allowed":"pointer",fontFamily:T.f,display:"flex",alignItems:"center",justifyContent:"center",gap:8,touchAction:"manipulation"}}
            >
              {saving?<><Spinner size={16}/> Mise à jour...</>:"Enregistrer le nouveau mot de passe"}
            </button>

            <button onClick={onDone} style={{width:"100%",marginTop:10,padding:"10px",background:"transparent",color:T.g4,border:"none",fontSize:12,cursor:"pointer",fontFamily:T.f}}>
              Annuler → Retour à la connexion
            </button>
          </>
        )}
      </div>
    </div>
  );
}

   APP ROOT
══════════════════════════════════════ */
function App(){
  const m=useM();
  const[screen,setScreen]=useState("loading");
  const[role,setRole]=useState(null);
  const[pendingOAuthUser,setPendingOAuthUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[pg,setPg]=useState("dash");
  const[appSettings,setAppSettings]=useState({logoText:APP_NAME,logoUrl:null,banners:[{id:"b1",text:"🏠 Gérez votre patrimoine en toute simplicité avec Louas",color:T.ac,active:true}]});
  const[unreadCount,setUnreadCount]=useState(0);
  const[unreadMsg,setUnreadMsg]=useState(0);
  const[rentAlerts,setRentAlerts]=useState([]);
  const[showRentAlert,setShowRentAlert]=useState(true);

  // Compte les notifs non lues (vraie méthode : récupère les IDs)
  const loadUnread=useCallback(async(uid)=>{
    try{
      // Notifs générales
      const notifs=await sb.select("notifications","user_id=eq."+uid+"&read=eq.false&select=id,type");
      const all=notifs||[];
      setUnreadCount(all.length);
      setUnreadMsg(all.filter(n=>n.type==="message").length);
    }catch(e){}
  },[]);

  // Vérifie les alertes loyer (proprio seulement)
  const loadRentAlerts=useCallback(async(uid,r)=>{
    if(r!=="owner") return;
    const alerts=await checkOverdueRents(uid);
    setRentAlerts(alerts);
    // Crée des notifs pour les impayés si pas encore envoyées aujourd'hui
    for(const a of alerts){
      try{
        const existing=await sb.select("notifications","user_id=eq."+uid+"&type=eq.overdue&body=like.*"+a.period+"*&created_at=gte."+new Date().toISOString().split("T")[0]);
        if(!existing?.length){
          await pushNotif(uid,"🚨 Loyer impayé",`${a.tenantName} (${a.unit}) n'a pas encore payé son loyer ${periodLabel(a.period)} — ${fmt(a.amount)} F.`,"overdue");
          // Notifier aussi le locataire
          await pushNotif(a.tenantId,"⚠️ Loyer en attente",`Votre loyer ${periodLabel(a.period)} de ${fmt(a.amount)} F n'a pas encore été enregistré. Merci de régulariser.`,"overdue");
        }
      }catch(e){}
    }
  },[]);

  useEffect(()=>{
    async function init(){
      // ── Retour PayTech succès/annulation
      const urlParams=new URLSearchParams(window.location.search);
      const paymentStatus=urlParams.get("payment");
      const paymentPeriod=urlParams.get("period");
      if(paymentStatus){
        window.history.replaceState(null,"",window.location.pathname);
        // Restaure la session depuis localStorage (pas besoin de se reconnecter)
        try{
          const session=await sb.getSession();
          if(session){
            const p=await sb.select("profiles","id=eq."+session.user.id);
            if(p?.[0]){
              setProfile(p[0]);setRole(p[0].role);setScreen("app");
              setPg("pay");
              if(paymentStatus==="success"){
                setTimeout(()=>{
                  // Recharge les paiements pour afficher le nouveau statut
                  window.dispatchEvent(new Event("louas:refresh"));
                },1500);
              }
              loadUnread(p[0].id);
              loadRentAlerts(p[0].id,p[0].role);
              return;
            }
          }
        }catch(e){console.error("Session restore error",e);}
      }

      // ── Retour OAuth Google/Apple (token dans #hash)
      // ── OU lien reset password (type=recovery)
      const hash=window.location.hash;
      if(hash&&hash.includes("access_token")){
        try{
          const params=new URLSearchParams(hash.replace("#",""));
          const accessToken=params.get("access_token");
          const refreshToken=params.get("refresh_token");
          const tokenType=params.get("type");

          // ── Reset password : afficher le formulaire de nouveau mot de passe
          if(tokenType==="recovery"&&accessToken){
            sb._token=accessToken;
            window.history.replaceState(null,"",window.location.pathname);
            setScreen("reset_password");
            setLoading(false);
            return;
          }

          if(accessToken){
            sb._token=accessToken;
            // Nettoie l'URL immédiatement
            window.history.replaceState(null,"",window.location.pathname);
            const userData=await sb.fetch("/auth/v1/user");
            if(userData?.id){
              sb._userId=userData.id;
              const session={access_token:accessToken,refresh_token:refreshToken,user:userData};
              sb.saveSession(session);
              // Sauvegarde email dans profiles si manquant
              try{
                await sb.fetch("/rest/v1/profiles?id=eq."+userData.id,{
                  method:"PATCH",
                  body:JSON.stringify({email:userData.email})
                });
              }catch(e){}
              await new Promise(r=>setTimeout(r,600));
              let prof=null;
              try{const ps=await sb.select("profiles","id=eq."+userData.id);prof=ps?.[0]||null;}catch(e){}
              if(!prof){
                setScreen("choose_role");
                setPendingOAuthUser(userData);
                return;
              }
              // Si profil existe mais email manquant, on le met à jour en mémoire
              if(!prof.email&&userData.email) prof={...prof,email:userData.email};
              setProfile(prof);setRole(prof.role);setScreen("app");
              loadUnread(prof.id);loadRentAlerts(prof.id,prof.role);
              return;
            }
          }
        }catch(e){console.error("OAuth error",e);}
      }
      try{
        const session=await sb.getSession();
        if(session){
          const p=await sb.select("profiles","id=eq."+session.user.id);
          if(p?.[0]){
            setProfile(p[0]);setRole(p[0].role);setScreen("app");
            loadUnread(p[0].id);
            loadRentAlerts(p[0].id,p[0].role);
            return;
          }
        }
      }catch(e){console.error(e);}
      try{
        const s=await sb.select("app_settings","id=eq.1");
        if(s?.[0]){setAppSettings({logoText:s[0].app_name||APP_NAME,logoUrl:s[0].logo_url||null,banners:typeof s[0].banners==="string"?JSON.parse(s[0].banners):s[0].banners||[]});}
      }catch(e){console.error(e);}
      setScreen(appSettings.showLanding===false?"login":"landing");
    }
    init();
  },[]);

  // Rafraîchit le badge toutes les 8s (au lieu de 60s)
  useEffect(()=>{
    if(!profile?.id) return;
    const t=setInterval(()=>loadUnread(profile.id),8000);
    return()=>clearInterval(t);
  },[profile?.id,loadUnread]);

  const handleLogin=async(r,p)=>{
    if(r==="_admin_login"){setScreen("admin_login");return;}
    if(r==="tenant"&&p?.id){
      fetch("https://ksvifaawouviiftujqet.supabase.co/functions/v1/accept-invitation",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+sb.key},
        body:JSON.stringify({tenant_id:p.id,email:p.email||""})
      }).catch(e=>console.log("invite update:",e));
    }
    setRole(r);setProfile(p);
    // Onboarding pour les nouveaux propriétaires (compte créé il y a moins de 2 min)
    const isNew=r==="owner"&&p?.created_at&&(Date.now()-new Date(p.created_at).getTime())<120000;
    if(isNew){setScreen("onboarding");return;}
    setScreen("app");setPg("dash");
    loadUnread(p.id);
    loadRentAlerts(p.id,r);
  };
  const handleLogout=async()=>{await sb.signOut();setRole(null);setProfile(null);setScreen("login");setPg("dash");setUnreadCount(0);setRentAlerts([]);};

  // Quand on ouvre les notifs, refresh le badge
  const handleSetPg=(page)=>{
    setPg(page);
    if(page==="notif"&&profile?.id) setTimeout(()=>loadUnread(profile.id),1500);
    if(page==="msg") setUnreadMsg(0);
  };

  if(screen==="loading") return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(150deg,#0F1729,#1e1b4b,#312e81)",color:"#fff",fontFamily:T.f}}>
      <div style={{fontSize:42,fontWeight:900,letterSpacing:"-2px",marginBottom:16}}><span style={{color:"#818cf8"}}>Louas</span></div>
      <Spinner size={28} color="rgba(255,255,255,.6)"/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
  if(appSettings.maintenanceEnabled&&role!=="admin") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(150deg,#0F1729,#1e1b4b,#312e81)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:T.f}}>
      <div style={{background:T.wh,borderRadius:20,padding:"36px 32px",maxWidth:420,width:"100%",textAlign:"center",boxShadow:"0 24px 64px rgba(0,0,0,.3)"}}>
        <div style={{fontSize:52,marginBottom:16}}>🔧</div>
        <div style={{fontSize:22,fontWeight:900,color:T.dk,marginBottom:10}}>Maintenance en cours</div>
        <div style={{fontSize:14,color:T.g5,lineHeight:1.6,marginBottom:24}}>{appSettings.maintenanceMsg||"L'application est en maintenance. Revenez dans quelques minutes."}</div>
        <div style={{fontSize:12,color:T.g4}}>Admin ? <button onClick={()=>setScreen("admin_login")} style={{background:"none",border:"none",color:T.ac,cursor:"pointer",fontWeight:700,fontFamily:T.f}}>Connexion ici</button></div>
      </div>
    </div>
  );
  if(screen==="reset_password") return <ResetPassword onDone={()=>setScreen("login")}/>;
  if(screen==="landing") return <Landing onLogin={()=>setScreen("login")} onRegister={()=>setScreen("login")} appSettings={appSettings}/>;
  if(screen==="onboarding") return <Onboarding profile={profile} onDone={()=>setScreen("app")} m={m}/>;
  if(screen==="login") return <Login onLogin={handleLogin} appSettings={appSettings}/>;
  if(screen==="admin_login") return <AdminLogin onLogin={(r,p)=>{setRole(r);setProfile(p);setScreen("app");setPg("dash");loadUnread(p.id);}} onBack={()=>setScreen("login")}/>;
  if(screen==="choose_role") return(
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,${T.dk},#1e1b4b,#312e81)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:T.wh,borderRadius:18,padding:"32px 28px",maxWidth:380,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,.3)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:36,fontWeight:900,letterSpacing:-1,marginBottom:4}}>
            <span>Louas</span>
          </div>
          <div style={{fontSize:15,fontWeight:700,color:T.dk,marginBottom:4}}>Bienvenue {pendingOAuthUser?.user_metadata?.full_name?.split(" ")[0]||""} 👋</div>
          <div style={{fontSize:13,color:T.g5}}>Vous connectez-vous en tant que ?</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {[["owner","🏠","Propriétaire","Je gère des biens et des locataires",T.ac,T.acL],
            ["tenant","🔑","Locataire","Je paie mon loyer et suis mes réclamations",T.gn,T.gnB]
          ].map(([r,emoji,label,desc,color,bg])=>(
            <button key={r} onClick={async()=>{
              const userData=pendingOAuthUser;
              try{
                await sb.insert("profiles",{id:userData.id,full_name:userData.user_metadata?.full_name||userData.email,email:userData.email,role:r});
              }catch(e){console.error(e);}
              const prof={id:userData.id,email:userData.email,role:r,full_name:userData.user_metadata?.full_name||userData.email};
              setProfile(prof);setRole(r);setPendingOAuthUser(null);setScreen("app");
              loadUnread(prof.id);loadRentAlerts(prof.id,r);
            }} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",border:"2px solid "+T.g2,borderRadius:12,background:T.wh,cursor:"pointer",fontFamily:T.f,textAlign:"left",transition:"all .15s",touchAction:"manipulation"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.background=bg;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.g2;e.currentTarget.style.background=T.wh;}}>
              <div style={{width:48,height:48,borderRadius:12,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{emoji}</div>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:T.dk}}>{label}</div>
                <div style={{fontSize:12,color:T.g5,marginTop:2}}>{desc}</div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  const nav=NAV[role]||NAV.tenant;
  const rc={tenant:T.gn,owner:T.ac,admin:T.or};
  const rl={tenant:"Locataire",owner:"Propriétaire",admin:"Admin"};
  const btmNav=nav.slice(0,5);
  const extraProps={m,profile,appSettings,setAppSettings,onLogout:handleLogout,setProfile,onNavigate:handleSetPg,refreshNotifs:()=>loadUnread(profile.id)};

  const renderPage=()=>{
    if(role==="tenant"){const pages={dash:TDash,pay:TPay,msg:TMsg,tix:TTix,notif:TNotif,prof:(p)=><TProf {...p} onLogout={handleLogout} role="tenant" setProfile={setProfile}/>};const C=pages[pg];return C?<C {...extraProps}/>:null;}
    if(role==="owner"){const pages={dash:ODash,props:OProps,ten:OTen,pay:OPay,leases:OLeases,msg:OMsg,exp:OExp,tix:OTix,notif:TNotif,sub:OSub,set:(p)=><TProf {...p} onLogout={handleLogout} role="owner" setProfile={setProfile}/>};const C=pages[pg];return C?<C {...extraProps}/>:null;}
    if(role==="admin"){const pages={dash:ADash,users:AUsers,subs:ASubs,paytech:APaytech,set:ASet};const C=pages[pg];return C?<C {...extraProps}/>:null;}
    return null;
  };

  const goHome=()=>handleSetPg("dash");

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:T.bg,fontFamily:T.f}}>
      {/* Alerte loyers impayés (proprio) */}
      {role==="owner"&&showRentAlert&&rentAlerts.length>0&&(
        <RentAlert alerts={rentAlerts} onClose={()=>setShowRentAlert(false)}/>
      )}

      {m&&(
        <header style={{background:T.wh,borderBottom:"1px solid "+T.g2,padding:"0 14px",height:50,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div onClick={goHome} style={{cursor:"pointer"}}>
              {role==="owner"&&profile?.company_logo
                ? <img src={profile.company_logo} alt={profile.company_name||"Logo"} style={{height:32,maxWidth:120,objectFit:"contain",borderRadius:4}}/>
                : <Logo appSettings={appSettings}/>
              }
            </div>
            <Bg color={rc[role]}>{rl[role]}</Bg>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>handleSetPg("notif")} style={{background:"none",border:"none",cursor:"pointer",position:"relative",padding:6,minWidth:36,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>
              {ic.bell(pg==="notif"?T.ac:T.g5,20)}
              <NotifBadge count={unreadCount}/>
            </button>
            <button onClick={handleLogout} style={{background:"none",border:"none",cursor:"pointer",padding:6,minWidth:36,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>{ic.out(T.g4,20)}</button>
          </div>
        </header>
      )}
      {m&&<BannerStrip banners={appSettings.banners}/>}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {!m&&(
          <aside style={{width:224,background:T.wh,borderRight:"1px solid "+T.g2,display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh"}}>
            <div style={{padding:"16px 16px 12px",borderBottom:"1px solid "+T.g1}}>
              <div onClick={goHome} style={{cursor:"pointer"}}>
                {role==="owner"&&profile?.company_logo
                  ? <div>
                      <img src={profile.company_logo} alt={profile.company_name||"Logo"} style={{height:36,maxWidth:160,objectFit:"contain",borderRadius:6,marginBottom:6}}/>
                      {profile.company_name&&<div style={{fontSize:11,fontWeight:700,color:T.g5,marginBottom:4}}>{profile.company_name}</div>}
                    </div>
                  : <Logo appSettings={appSettings}/>
                }
              </div>
              <div style={{marginTop:4}}><Bg color={rc[role]}>{rl[role]}</Bg></div>
            </div>
            <BannerStrip banners={appSettings.banners}/>
            <nav style={{flex:1,padding:"8px 6px",overflowY:"auto"}}>
              {nav.map(item=>{
                const a=pg===item.id;
                const isNotif=item.id==="notif";
                const isMsg=item.id==="msg";
                return(
                  <button key={item.id} onClick={()=>handleSetPg(item.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",marginBottom:2,border:"none",cursor:"pointer",borderRadius:T.rs,fontFamily:T.f,fontSize:13,fontWeight:a?700:500,textAlign:"left",color:a?T.ac:T.g6,background:a?T.acL:"transparent",minHeight:42,touchAction:"manipulation",position:"relative"}}>
                    {item.ic(a?T.ac:T.g4,20)}
                    <span style={{flex:1}}>{item.l}</span>
                    {isNotif&&unreadCount>0&&<Bg color={T.rd} bg={T.rdB}>{unreadCount}</Bg>}
                    {isMsg&&unreadMsg>0&&<Bg color={T.rd} bg={T.rdB}>{unreadMsg}</Bg>}
                  </button>
                );
              })}
            </nav>
            <div style={{padding:"10px 14px",borderTop:"1px solid "+T.g1,display:"flex",alignItems:"center",gap:10}}>
              {role==="owner"&&profile?.company_logo
                ? <img src={profile.company_logo} alt="" style={{width:30,height:30,objectFit:"contain",borderRadius:6,border:"1px solid "+T.g2,padding:2,background:"#fff",flexShrink:0}}/>
                : <Av name={profile?.full_name||"?"} sz={30} c={rc[role]}/>
              }
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:T.dk,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profile?.company_name||profile?.full_name||"—"}</div>
                <div style={{fontSize:10,color:T.g4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profile?.email||""}</div>
              </div>
              <button onClick={handleLogout} style={{background:"none",border:"none",cursor:"pointer",padding:6,minWidth:32,minHeight:32,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>{ic.out(T.g4,18)}</button>
            </div>
          </aside>
        )}
        <main style={{flex:1,padding:m?"14px 12px 90px":"22px 28px",overflowY:"auto",minWidth:0}}>
          {renderPage()||<div style={{textAlign:"center",padding:40,color:T.g4}}>{ic.gear(T.g3,40)}<div style={{marginTop:10,fontWeight:700,color:T.g6}}>En construction</div></div>}
        </main>
      </div>
      {m&&(
        <nav style={{position:"fixed",bottom:0,left:0,right:0,background:T.wh,borderTop:"1px solid "+T.g2,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 10px rgba(0,0,0,.06)"}}>
          {btmNav.map(item=>{
            const a=pg===item.id;
            const isNotif=item.id==="notif";
            const isMsg=item.id==="msg";
            return(
              <button key={item.id} onClick={()=>handleSetPg(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 0 6px",border:"none",cursor:"pointer",background:"transparent",fontFamily:T.f,position:"relative",minHeight:52,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>
                <div style={{position:"relative"}}>
                  {item.ic(a?T.ac:T.g4,22)}
                  {isNotif&&<NotifBadge count={unreadCount}/>}
                  {isMsg&&unreadMsg>0&&<span style={{position:"absolute",top:-2,right:-2,width:8,height:8,borderRadius:"50%",background:T.rd,border:"1.5px solid #fff"}}/>}
                </div>
                <span style={{fontSize:9,fontWeight:a?700:500,color:a?T.ac:T.g4}}>{item.l}</span>
              </button>
            );
          })}
        </nav>
      )}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

</script>
</body></html>
